<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzone — {{PUNTATA_TITLE}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1923; color: #e0e6ed; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 1.6rem; color: #fff; margin-bottom: 8px; }
        .header .subtitle { font-size: 0.9rem; color: #8899aa; }
        .score-bar { display: flex; justify-content: space-between; align-items: center; background: #1a2a3a; border-radius: 12px; padding: 14px 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
        .score-bar .score { font-size: 1.3rem; font-weight: 700; color: #4fc3f7; }
        .score-bar .progress { font-size: 0.9rem; color: #8899aa; }
        .streak-display { font-size: 1.1rem; min-width: 30px; }
        .multiplier-display { font-size: 0.8rem; color: #ffb74d; font-weight: 600; }
        .timer-container { display: flex; align-items: center; gap: 8px; }
        .timer-bar { width: 120px; height: 8px; background: #2a3a4a; border-radius: 4px; overflow: hidden; }
        .timer-fill { height: 100%; background: #4fc3f7; border-radius: 4px; transition: width 0.1s linear, background 0.3s; width: 100%; }
        .timer-fill.warning { background: #ffb74d; }
        .timer-fill.danger { background: #ef5350; }
        .timer-text { font-size: 0.85rem; font-weight: 600; color: #8899aa; min-width: 30px; }
        .question-card { background: #f8f9fa; border-radius: 16px; padding: 28px 24px; color: #1a1a2e; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .question-number { font-size: 0.8rem; font-weight: 600; color: #6c757d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .question-category { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .question-text { font-size: 1.1rem; line-height: 1.5; font-weight: 500; margin-bottom: 20px; color: #1a1a2e; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { display: block; width: 100%; padding: 14px 18px; border: 2px solid #dee2e6; border-radius: 10px; background: #fff; color: #1a1a2e; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.2s; outline: none; }
        .option-btn:hover:not(.disabled) { border-color: #4fc3f7; background: #e3f7ff; }
        .option-btn:focus-visible { border-color: #4fc3f7; box-shadow: 0 0 0 3px rgba(79,195,247,0.3); }
        .option-btn.selected { border-color: #4fc3f7; background: #e3f7ff; font-weight: 600; }
        .option-btn.correct { border-color: #43a047; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
        .option-btn.wrong { border-color: #e53935; background: #ffebee; color: #c62828; font-weight: 600; }
        .option-btn.disabled { cursor: default; opacity: 0.7; }
        .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; outline: none; }
        .btn:focus-visible { box-shadow: 0 0 0 3px rgba(79,195,247,0.4); }
        .btn-primary { background: #4fc3f7; color: #0f1923; }
        .btn-primary:hover { background: #29b6f6; }
        .btn-primary:disabled { background: #546e7a; color: #90a4ae; cursor: not-allowed; }
        .btn-multiplier { background: #ff9800; color: #fff; font-size: 0.85rem; padding: 8px 14px; }
        .btn-multiplier:hover { background: #f57c00; }
        .btn-multiplier.used { background: #546e7a; color: #90a4ae; cursor: not-allowed; }
        .btn-contest { background: transparent; border: 1px solid #78909c; color: #78909c; font-size: 0.85rem; padding: 8px 16px; }
        .btn-contest:hover { border-color: #ffb74d; color: #ffb74d; }
        .btn-secondary { background: #37474f; color: #e0e6ed; }
        .btn-secondary:hover { background: #455a64; }
        .contest-area { margin-top: 12px; display: none; }
        .contest-area.visible { display: block; }
        .contest-area textarea { width: 100%; padding: 10px; border: 1px solid #dee2e6; border-radius: 8px; font-size: 0.9rem; resize: vertical; min-height: 60px; font-family: inherit; }
        .feedback { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; display: none; }
        .feedback.visible { display: block; }
        .feedback.correct-fb { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .feedback.wrong-fb { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .feedback .points-change { font-weight: 700; margin-left: 6px; }
        .streak-bonus { color: #ff9800; font-weight: 700; margin-left: 6px; }
        .summary { display: none; }
        .summary.visible { display: block; }
        .summary h2 { font-size: 1.4rem; color: #fff; margin-bottom: 16px; text-align: center; }
        .summary-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #1a2a3a; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; color: #4fc3f7; }
        .stat-card .stat-label { font-size: 0.75rem; color: #8899aa; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-list { background: #1a2a3a; border-radius: 12px; padding: 16px; margin-bottom: 16px; max-height: 400px; overflow-y: auto; }
        .summary-item { padding: 10px 0; border-bottom: 1px solid #2a3a4a; font-size: 0.85rem; cursor: pointer; }
        .summary-item:last-child { border-bottom: none; }
        .summary-item:hover { background: #223344; border-radius: 6px; }
        .summary-item .q-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .summary-item .q-num { font-weight: 700; color: #fff; }
        .summary-item .q-time { color: #8899aa; font-size: 0.8rem; }
        .summary-item .q-result { font-size: 0.8rem; }
        .summary-item .q-result.correct-r { color: #66bb6a; }
        .summary-item .q-result.wrong-r { color: #ef5350; }
        .summary-item .q-explanation { margin-top: 6px; padding: 8px 12px; background: #223344; border-radius: 6px; font-size: 0.8rem; color: #b0bec5; line-height: 1.4; display: none; }
        .summary-item .q-explanation.visible { display: block; }
        .summary-item .q-contest { margin-top: 4px; font-style: italic; color: #ffb74d; font-size: 0.8rem; }
        .share-btn { display: block; width: 100%; padding: 14px; background: #4fc3f7; color: #0f1923; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
        .share-btn:hover { background: #29b6f6; }
        .save-btn { display: block; width: 100%; padding: 14px; background: #37474f; color: #e0e6ed; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .save-btn:hover { background: #455a64; }
        .share-msg { text-align: center; color: #66bb6a; font-size: 0.85rem; margin-top: 8px; display: none; }
        .share-msg.visible { display: block; }
        .name-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,25,35,0.97); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .name-overlay.hidden { display: none; }
        .name-card { background: #f8f9fa; border-radius: 16px; padding: 36px 32px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
        .name-card h2 { color: #1a1a2e; font-size: 1.3rem; margin-bottom: 8px; }
        .name-card p { color: #546e7a; font-size: 0.9rem; margin-bottom: 20px; }
        .name-card input { width: 100%; padding: 12px 16px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .name-card input:focus { border-color: #4fc3f7; }
        .name-card button { margin-top: 16px; width: 100%; padding: 14px; background: #4fc3f7; color: #0f1923; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .name-card button:hover:not(:disabled) { background: #29b6f6; }
        .name-card button:disabled { background: #546e7a; color: #90a4ae; cursor: not-allowed; }
        .hidden { display: none !important; }
        .intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 900; background: #0f1923; background-size: cover; background-position: center; cursor: pointer; }
        .intro-overlay.hidden { display: none; }
        .intro-content { background: rgba(15,25,35,0.82); padding: 40px 32px; border-radius: 16px; text-align: center; max-width: 600px; width: 90%; }
        .intro-content .intro-cat { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: #4fc3f7; margin-bottom: 12px; }
        .intro-content .intro-q { font-size: 1.2rem; color: #fff; line-height: 1.5; margin-bottom: 20px; }
        .intro-content .intro-hint { font-size: 0.8rem; color: #8899aa; }
        .audio-player { display: flex; align-items: center; gap: 12px; background: #1a1a2e; border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; background: #4fc3f7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
        .play-btn:hover { background: #29b6f6; }
        .play-btn svg { fill: #0f1923; width: 20px; height: 20px; }
        .audio-info { flex: 1; color: #8899aa; font-size: 0.85rem; }
        .audio-bar { width: 100%; height: 4px; background: #37474f; border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .audio-bar-fill { height: 100%; background: #4fc3f7; width: 0%; transition: width 0.1s linear; }
        @media (max-width: 500px) { body { padding: 12px; } .question-card { padding: 20px 16px; } .header h1 { font-size: 1.3rem; } .score-bar { flex-wrap: wrap; gap: 8px; } .timer-bar { width: 80px; } .intro-content { padding: 28px 20px; } .intro-content .intro-q { font-size: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Quizzone — {{PUNTATA_TITLE}}</h1>
            <div class="subtitle">{{SUBTITLE}}</div>
        </div>
        <div class="score-bar" id="scoreBar">
            <div class="score" id="scoreDisplay">0 punti</div>
            <div class="streak-display" id="streakDisplay"></div>
            <div style="text-align:center">
                <div style="font-size:0.85rem;color:#8899aa;font-weight:600" id="playerNameDisplay"></div>
                <div class="multiplier-display" id="multiplierDisplay">⚡ x2 rimasti: 4/4</div>
            </div>
            <div class="timer-container">
                <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
                <div class="timer-text" id="timerText">20s</div>
            </div>
            <div class="progress" id="progressDisplay">1 / 35</div>
        </div>
        <div class="question-card" id="questionCard">
            <div class="question-number" id="questionNumber"></div>
            <div class="question-category" id="questionCategory"></div>
            <div class="question-text" id="questionText"></div>
            <div class="audio-player" id="audioPlayer" style="display:none">
                <button class="play-btn" id="audioPlayBtn" aria-label="Riproduci audio"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></button>
                <div class="audio-info"><div id="audioStatus">Premi ▶ per ascoltare</div><div class="audio-bar"><div class="audio-bar-fill" id="audioBar"></div></div></div>
            </div>
            <div class="options" id="optionsContainer" role="group" aria-label="Opzioni di risposta"></div>
            <div class="feedback" id="feedback"></div>
            <div class="btn-row" id="btnRow">
                <button class="btn btn-primary" id="confirmBtn" disabled>Conferma</button>
                <button class="btn btn-multiplier" id="multiplierBtn">⚡ x2</button>
                <button class="btn btn-contest" id="contestBtn" style="display:none">Contesta domanda</button>
            </div>
            <div class="contest-area" id="contestArea">
                <textarea id="contestText" placeholder="Scrivi la tua contestazione..." aria-label="Campo contestazione"></textarea>
                <button class="btn btn-secondary" id="saveContestBtn">Salva contestazione</button>
            </div>
            <div class="btn-row" style="margin-top:12px">
                <button class="btn btn-primary" id="nextBtn" style="display:none">Prossima →</button>
            </div>
        </div>
        <div class="summary" id="summary">
            <h2>Riepilogo finale</h2>
            <div class="summary-stats" id="summaryStats"></div>
            <div class="summary-list" id="summaryList"></div>
            <button class="share-btn" id="shareBtn">Condividi risultati</button>
            <button class="save-btn" id="saveBtn">Salva come file di testo</button>
            <div class="share-msg" id="shareMsg">Copiato negli appunti!</div>
        </div>
    </div>
    <div class="name-overlay" id="nameOverlay">
        <div class="name-card">
            <h2>Quizzone — {{PUNTATA_TITLE}}</h2>
            <p>Inserisci il tuo nome per iniziare</p>
            <input type="text" id="playerNameInput" placeholder="Il tuo nome..." autocomplete="off">
            <button id="startBtn" disabled>Inizia il quiz</button>
        </div>
    </div>
    <div class="intro-overlay hidden" id="introOverlay">
        <div class="intro-content">
            <div class="intro-cat" id="introCat"></div>
            <div class="intro-q" id="introQ"></div>
            <div class="intro-hint">Tocca per rispondere</div>
        </div>
    </div>
<script>
// ============================================================
// QUIZ DATA — Sostituire solo questa sezione per ogni puntata
// ============================================================
const QUIZ_META = {
    title: "{{PUNTATA_TITLE}}",
    filename: "{{FILENAME}}",
    timerDefault: 20,
    timerAudio: 30
};

const questions = {{QUESTIONS_JSON}};
// Formato: [{q:"...", opts:["A","B","C","D"], ans:0-3, cat:"categoria", audio:"base64..." (opzionale)}, ...]

// Immagini di sfondo per categoria (base64 JPEG) — cambiare ad ogni puntata
const catBackgrounds = {{CATEGORY_BACKGROUNDS_JSON}};
// Formato: {"geografia":"data:image/jpeg;base64,...", "sport":"data:image/jpeg;base64,...", ...}
// ============================================================

const catColors = {
    geografia:"#1a3a5c", tecnologia:"#0d3b2e", scienze:"#1b4d5c",
    sport:"#5c2a0d", storia:"#4a3b1f", cibo:"#5c1a1a",
    attualita:"#2a3545", matematica:"#1a2a1a", musica:"#3d1a4a",
    cinema:"#3d0d0d", letteratura:"#3d2a1a", arte:"#2a2a4a",
    inglese:"#1a1a4a", lingue:"#4a3a1a", anagrammi:"#2a3d1a",
    dituttounpo:"#2a1a3d", lingua_italiana:"#1a3a5c"
};
const catNames = {
    geografia:"Geografia", tecnologia:"Tecnologia", scienze:"Scienze",
    sport:"Sport", storia:"Storia", cibo:"Cibo e benessere",
    attualita:"Attualità", matematica:"Matematica", musica:"Musica",
    cinema:"Cinema", letteratura:"Letteratura", arte:"Arte",
    inglese:"Inglese", lingue:"Lingue straniere", anagrammi:"Anagrammi",
    dituttounpo:"Di tutto un po'", lingua_italiana:"Lingua italiana"
};

(function() {
'use strict';
let playerName='', currentIndex=0, score=0, streak=0, maxStreak=0;
let multiplierRemaining=4, multiplierActive=false, selectedOption=-1, answered=false;
let timerInterval=null, timeLeft=20, startTime=0, results=[];
let audioEl=null, audioStarted=false;

const $ = id => document.getElementById(id);
const nameOverlay=$('nameOverlay'), playerNameInput=$('playerNameInput'), startBtn=$('startBtn');
const playerNameDisplay=$('playerNameDisplay'), introOverlay=$('introOverlay');
const introCat=$('introCat'), introQ=$('introQ');
const scoreDisplay=$('scoreDisplay'), streakDisplay=$('streakDisplay');
const multiplierDisplay=$('multiplierDisplay'), timerFill=$('timerFill'), timerText=$('timerText');
const progressDisplay=$('progressDisplay'), questionCard=$('questionCard');
const questionNumber=$('questionNumber'), questionCategory=$('questionCategory');
const questionText=$('questionText'), optionsContainer=$('optionsContainer');
const feedbackEl=$('feedback'), confirmBtn=$('confirmBtn'), multiplierBtn=$('multiplierBtn');
const contestBtn=$('contestBtn'), contestArea=$('contestArea');
const contestText=$('contestText'), saveContestBtn=$('saveContestBtn');
const nextBtn=$('nextBtn'), summary=$('summary');
const summaryStats=$('summaryStats'), summaryList=$('summaryList');
const shareBtn=$('shareBtn'), saveFileBtn=$('saveBtn'), shareMsg=$('shareMsg');
const audioPlayer=$('audioPlayer'), audioPlayBtn=$('audioPlayBtn');
const audioBar=$('audioBar'), audioStatus=$('audioStatus');

playerNameInput.addEventListener('input', function(){ startBtn.disabled = this.value.trim().length===0; });
playerNameInput.addEventListener('keydown', function(e){ if(e.key==='Enter'&&this.value.trim()) startQuiz(); });
startBtn.addEventListener('click', startQuiz);

function startQuiz(){ playerName=playerNameInput.value.trim(); if(!playerName)return; playerNameDisplay.textContent=playerName; nameOverlay.classList.add('hidden'); showIntro(); }

function showIntro(){
    const q=questions[currentIndex];
    introCat.textContent=catNames[q.cat]||q.cat;
    introQ.textContent=q.q;
    // Set category background
    const bg=catBackgrounds[q.cat];
    if(bg){ introOverlay.style.backgroundImage='url('+bg+')'; introOverlay.style.background=''; introOverlay.style.backgroundSize='cover'; introOverlay.style.backgroundPosition='center'; introOverlay.style.backgroundImage='linear-gradient(rgba(15,25,35,0.3),rgba(15,25,35,0.3)),url('+bg+')'; }
    else { introOverlay.style.backgroundImage='none'; introOverlay.style.background='#0f1923'; }
    introOverlay.classList.remove('hidden');
}
introOverlay.addEventListener('click', function(){ introOverlay.classList.add('hidden'); showQuestion(); });

function showQuestion(){
    const q=questions[currentIndex];
    const hasAudio=!!q.audio;
    const timer=hasAudio?QUIZ_META.timerAudio:QUIZ_META.timerDefault;

    questionNumber.textContent='Domanda '+(currentIndex+1)+' di '+questions.length;
    questionCategory.textContent=catNames[q.cat]||q.cat;
    questionCategory.style.background=catColors[q.cat]||'#333';
    questionText.textContent=q.q;
    progressDisplay.textContent=(currentIndex+1)+' / '+questions.length;

    // Audio
    if(hasAudio){
        audioPlayer.style.display='';
        audioStarted=false;
        audioStatus.textContent='Premi ▶ per ascoltare';
        audioBar.style.width='0%';
        audioEl=new Audio('data:audio/mp3;base64,'+q.audio);
        audioEl.addEventListener('timeupdate',function(){ if(audioEl.duration) audioBar.style.width=(audioEl.currentTime/audioEl.duration*100)+'%'; });
        audioEl.addEventListener('ended',function(){ audioStatus.textContent='Fine spezzone'; });
    } else {
        audioPlayer.style.display='none';
        audioEl=null;
    }

    optionsContainer.innerHTML='';
    // Question image (e.g. art questions with a painting)
    const imgContainer = document.getElementById('questionImage');
    if(q.img){
        if(!imgContainer){ const d=document.createElement('div'); d.id='questionImage'; d.style.cssText='text-align:center;margin-bottom:16px;'; questionText.after(d); }
        document.getElementById('questionImage').innerHTML='<img src="'+q.img+'" style="max-width:100%;max-height:300px;border-radius:10px;" alt="Immagine domanda">';
    } else if(imgContainer){ imgContainer.innerHTML=''; }

    q.opts.forEach(function(opt,i){
        const btn=document.createElement('button');
        btn.className='option-btn'; btn.textContent=opt;
        btn.setAttribute('role','radio'); btn.setAttribute('aria-checked','false');
        btn.addEventListener('click',function(){ selectOption(i); });
        optionsContainer.appendChild(btn);
    });

    selectedOption=-1; answered=false; multiplierActive=false;
    confirmBtn.disabled=true; confirmBtn.style.display='';
    nextBtn.style.display='none'; contestBtn.style.display='none';
    contestArea.classList.remove('visible'); contestText.value='';
    feedbackEl.classList.remove('visible','correct-fb','wrong-fb'); feedbackEl.innerHTML='';
    multiplierBtn.style.display=multiplierRemaining>0?'':'none';
    multiplierBtn.classList.remove('used');

    if(hasAudio){ timerText.textContent='▶'; timerFill.style.width='100%'; timerFill.className='timer-fill'; }
    else { startTimer(timer); }
}

// Audio play
audioPlayBtn.addEventListener('click',function(){
    if(!audioEl||audioStarted) return;
    audioEl.play(); audioStarted=true; audioStatus.textContent='In riproduzione...';
    startTimer(QUIZ_META.timerAudio);
});
function startTimer(duration){
    timeLeft=duration; startTime=Date.now();
    timerFill.style.width='100%'; timerFill.className='timer-fill'; timerText.textContent=duration+'s';
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(function(){
        const elapsed=(Date.now()-startTime)/1000;
        timeLeft=Math.max(0,duration-elapsed);
        timerFill.style.width=(timeLeft/duration*100)+'%';
        timerText.textContent=Math.ceil(timeLeft)+'s';
        if(timeLeft<=5) timerFill.className='timer-fill danger';
        else if(timeLeft<=10) timerFill.className='timer-fill warning';
        else timerFill.className='timer-fill';
        if(timeLeft<=0){ clearInterval(timerInterval); timerInterval=null; handleTimeout(); }
    },100);
}
function stopTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

function selectOption(i){ if(answered)return; selectedOption=i;
    optionsContainer.querySelectorAll('.option-btn').forEach(function(b,j){
        b.classList.toggle('selected',j===i); b.setAttribute('aria-checked',j===i?'true':'false');
    }); confirmBtn.disabled=false; }

multiplierBtn.addEventListener('click',function(){
    if(answered||multiplierRemaining<=0||multiplierActive)return;
    multiplierActive=true; multiplierRemaining--;
    multiplierBtn.classList.add('used');
    multiplierDisplay.textContent='⚡ x2 rimasti: '+multiplierRemaining+'/4';
});

confirmBtn.addEventListener('click',function(){ if(answered||selectedOption<0)return; stopTimer(); processAnswer(selectedOption); });
function handleTimeout(){ if(answered)return; processAnswer(-1); }

function getPenalty(){ if(score<0)return 25; if(score<=1000)return 75; if(score<=3000)return 150; return 300; }

function processAnswer(chosen){
    answered=true;
    const q=questions[currentIndex], correct=q.ans;
    const elapsed=(Date.now()-startTime)/1000;
    const hasAudio=!!q.audio;
    const maxTime=hasAudio?QUIZ_META.timerAudio:QUIZ_META.timerDefault;
    const timeUsed=Math.min(elapsed,maxTime);
    const isCorrect=chosen===correct, isTimeout=chosen===-1;

    optionsContainer.querySelectorAll('.option-btn').forEach(function(b,i){
        b.classList.add('disabled');
        if(i===correct) b.classList.add('correct');
        if(i===chosen&&!isCorrect) b.classList.add('wrong');
    });

    let pointsChange=0, streakBonus=0, fbText='';
    if(isCorrect){
        pointsChange=Math.max(100,Math.round(300-(timeUsed/maxTime)*200));
        if(multiplierActive) pointsChange*=2;
        streak++; if(streak>maxStreak) maxStreak=streak;
        if(streak===3) streakBonus=50; else if(streak===5) streakBonus=100; else if(streak===7) streakBonus=200;
        score+=pointsChange+streakBonus;
        fbText='✓ Corretto!<span class="points-change">+'+pointsChange+'</span>';
        if(streakBonus>0) fbText+='<span class="streak-bonus">+'+streakBonus+' streak!</span>';
        feedbackEl.className='feedback visible correct-fb';
    } else {
        let penalty=getPenalty(); if(multiplierActive) penalty=Math.round(penalty*1.5);
        pointsChange=-penalty; score+=pointsChange; streak=0;
        fbText=isTimeout?'⏱ Tempo scaduto!':'✗ Sbagliato!';
        fbText+='<span class="points-change">'+pointsChange+'</span>';
        fbText+='<br><small>Corretta: '+q.opts[correct]+'</small>';
        feedbackEl.className='feedback visible wrong-fb';
    }
    feedbackEl.innerHTML=fbText;
    scoreDisplay.textContent=score+' punti';
    streakDisplay.textContent=streak>=2?'🔥'+streak:'';
    confirmBtn.style.display='none'; multiplierBtn.style.display='none';
    nextBtn.style.display=''; contestBtn.style.display='';

    results.push({index:currentIndex,question:q.q,category:q.cat,options:q.opts,correct,chosen,isCorrect,isTimeout,points:pointsChange,streakBonus,multiplierUsed:multiplierActive,timeUsed,contest:''});
}

contestBtn.addEventListener('click',function(){ contestArea.classList.toggle('visible'); });
saveContestBtn.addEventListener('click',function(){ const t=contestText.value.trim(); if(t&&results.length>0) results[results.length-1].contest=t; contestArea.classList.remove('visible'); });

nextBtn.addEventListener('click',function(){ if(audioEl){audioEl.pause();audioEl=null;} currentIndex++; if(currentIndex>=questions.length) showSummary(); else showIntro(); });
function showSummary(){
    questionCard.style.display='none'; $('scoreBar').style.display='none'; summary.classList.add('visible');
    const tot=results.length, corr=results.filter(r=>r.isCorrect).length;
    const avgT=(results.reduce((s,r)=>s+r.timeUsed,0)/tot).toFixed(1);
    summaryStats.innerHTML='<div class="stat-card"><div class="stat-value">'+score+'</div><div class="stat-label">Punteggio</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+corr+'/'+tot+'</div><div class="stat-label">Corrette</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+Math.round(corr/tot*100)+'%</div><div class="stat-label">Percentuale</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+maxStreak+'</div><div class="stat-label">Max Streak</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+avgT+'s</div><div class="stat-label">Tempo medio</div></div>';
    let html='';
    results.forEach(function(r,i){
        const sc=r.isCorrect?'correct-r':'wrong-r';
        const st=r.isCorrect?'✓ Corretto':(r.isTimeout?'⏱ Timeout':'✗ Sbagliato');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        const bon=r.streakBonus>0?' (+'+r.streakBonus+' streak)':'';
        const mult=r.multiplierUsed?' [x2]':'';
        const cont=r.contest?'<div class="q-contest">📝 '+esc(r.contest)+'</div>':'';
        html+='<div class="summary-item" data-idx="'+i+'"><div class="q-head"><span class="q-num">#'+(i+1)+' - '+(catNames[r.category]||r.category)+'</span><span class="q-time">'+r.timeUsed.toFixed(1)+'s</span></div>'+
            '<div class="q-result '+sc+'">'+st+' '+pts+bon+mult+'</div>'+
            '<div class="q-explanation" id="exp-'+i+'"><strong>Domanda:</strong> '+esc(r.question)+'<br><strong>Corretta:</strong> '+esc(r.options[r.correct])+'<br>'+
            (r.chosen>=0&&!r.isCorrect?'<strong>Tua:</strong> '+esc(r.options[r.chosen])+'<br>':'')+
            '</div>'+cont+'</div>';
    });
    summaryList.innerHTML=html;
    summaryList.addEventListener('click',function(e){ const item=e.target.closest('.summary-item'); if(!item)return; const exp=$('exp-'+item.dataset.idx); if(exp) exp.classList.toggle('visible'); });
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

shareBtn.addEventListener('click',function(){
    const corr=results.filter(r=>r.isCorrect).length;
    let t='🎯 QUIZZONE — '+QUIZ_META.title+'\n👤 '+playerName+'\n🏆 '+score+' punti\n✅ '+corr+'/'+questions.length+'\n🔥 Max streak: '+maxStreak+'\n\n';
    results.forEach(function(r,i){
        const ic=r.isCorrect?'✅':(r.isTimeout?'⏱️':'❌');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        const bon=r.streakBonus>0?' (+'+r.streakBonus+')':'';
        const mult=r.multiplierUsed?' [x2]':'';
        t+=ic+' #'+(i+1)+' '+(catNames[r.category]||r.category)+' — '+pts+bon+mult+' ('+r.timeUsed.toFixed(1)+'s)\n';
        if(r.contest) t+='   📝 '+r.contest+'\n';
    });
    navigator.clipboard.writeText(t).then(()=>{shareMsg.classList.add('visible');setTimeout(()=>shareMsg.classList.remove('visible'),3000);}).catch(()=>{
        const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        shareMsg.classList.add('visible');setTimeout(()=>shareMsg.classList.remove('visible'),3000);
    });
});

saveFileBtn.addEventListener('click',function(){
    const corr=results.filter(r=>r.isCorrect).length;
    let t='QUIZZONE — '+QUIZ_META.title+'\nGiocatore: '+playerName+'\nPunteggio: '+score+'\nCorrette: '+corr+'/'+questions.length+'\nMax streak: '+maxStreak+'\n'+'='.repeat(50)+'\n\n';
    results.forEach(function(r,i){
        const st=r.isCorrect?'CORRETTO':(r.isTimeout?'TIMEOUT':'SBAGLIATO');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        t+='#'+(i+1)+' ['+( catNames[r.category]||r.category)+'] '+st+' '+pts;
        if(r.streakBonus>0) t+=' (+'+r.streakBonus+' streak)';
        if(r.multiplierUsed) t+=' [x2]';
        t+=' ('+r.timeUsed.toFixed(1)+'s)\n  Q: '+r.question+'\n  Corretta: '+r.options[r.correct]+'\n';
        if(r.chosen>=0&&!r.isCorrect) t+='  Tua: '+r.options[r.chosen]+'\n';
        if(r.contest) t+='  CONTESTAZIONE: '+r.contest+'\n';
        t+='\n';
    });
    const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=QUIZ_META.filename+'_'+playerName.replace(/\s+/g,'_')+'.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
});

})();
</script>
</body>
</html>
