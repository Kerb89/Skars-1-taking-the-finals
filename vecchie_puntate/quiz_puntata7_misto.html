const catColors = {
    geografia:"#1a3a5c", tecnologia:"#0d3b2e", scienze:"#1b4d5c",
    sport:"#5c2a0d", storia:"#4a3b1f", cibo:"#5c1a1a",
    attualita:"#2a3545", matematica:"#1a2a1a", musica:"#3d1a4a",
    cinema:"#3d0d0d", letteratura:"#3d2a1a", arte:"#2a2a4a",
    inglese:"#1a1a4a", lingue:"#4a3a1a", anagrammi:"#2a3d1a",
    dituttounpo:"#2a1a3d", lingua_italiana:"#1a3a5c"
};
const catNames = {
    geografia:"Geografia", tecnologia:"Tecnologia", scienze:"Scienze",
    sport:"Sport", storia:"Storia", cibo:"Cibo e benessere",
    attualita:"Attualità", matematica:"Matematica", musica:"Musica",
    cinema:"Cinema", letteratura:"Letteratura", arte:"Arte",
    inglese:"Inglese", lingue:"Lingue straniere", anagrammi:"Anagrammi",
    dituttounpo:"Di tutto un po'", lingua_italiana:"Lingua italiana"
};

(function() {
'use strict';
let playerName='', currentIndex=0, score=0, streak=0, maxStreak=0;
let multiplierRemaining=4, multiplierActive=false, selectedOption=-1, answered=false;
let timerInterval=null, timeLeft=20, startTime=0, results=[];
let audioEl=null, audioStarted=false;

const $ = id => document.getElementById(id);
const nameOverlay=$('nameOverlay'), playerNameInput=$('playerNameInput'), startBtn=$('startBtn');
const playerNameDisplay=$('playerNameDisplay'), introOverlay=$('introOverlay');
const introCat=$('introCat'), introQ=$('introQ');
const scoreDisplay=$('scoreDisplay'), streakDisplay=$('streakDisplay');
const multiplierDisplay=$('multiplierDisplay'), timerFill=$('timerFill'), timerText=$('timerText');
const progressDisplay=$('progressDisplay'), questionCard=$('questionCard');
const questionNumber=$('questionNumber'), questionCategory=$('questionCategory');
const questionText=$('questionText'), optionsContainer=$('optionsContainer');
const feedbackEl=$('feedback'), confirmBtn=$('confirmBtn'), multiplierBtn=$('multiplierBtn');
const contestBtn=$('contestBtn'), contestArea=$('contestArea');
const contestText=$('contestText'), saveContestBtn=$('saveContestBtn');
const nextBtn=$('nextBtn'), summary=$('summary');
const summaryStats=$('summaryStats'), summaryList=$('summaryList');
const shareBtn=$('shareBtn'), saveFileBtn=$('saveBtn'), shareMsg=$('shareMsg');
const audioPlayer=$('audioPlayer'), audioPlayBtn=$('audioPlayBtn');
const audioBar=$('audioBar'), audioStatus=$('audioStatus');

playerNameInput.addEventListener('input', function(){ startBtn.disabled = this.value.trim().length===0; });
playerNameInput.addEventListener('keydown', function(e){ if(e.key==='Enter'&&this.value.trim()) startQuiz(); });
startBtn.addEventListener('click', startQuiz);

function startQuiz(){ playerName=playerNameInput.value.trim(); if(!playerName)return; playerNameDisplay.textContent=playerName; nameOverlay.classList.add('hidden'); showIntro(); }

function showIntro(){
    const q=questions[currentIndex];
    introCat.textContent=catNames[q.cat]||q.cat;
    introQ.textContent=q.q;
    // Set category background
    const bg=catBackgrounds[q.cat];
    if(bg){ introOverlay.style.backgroundImage='url('+bg+')'; introOverlay.style.background=''; introOverlay.style.backgroundSize='cover'; introOverlay.style.backgroundPosition='center'; introOverlay.style.backgroundImage='linear-gradient(rgba(15,25,35,0.3),rgba(15,25,35,0.3)),url('+bg+')'; }
    else { introOverlay.style.backgroundImage='none'; introOverlay.style.background='#0f1923'; }
    introOverlay.classList.remove('hidden');
}
introOverlay.addEventListener('click', function(){ introOverlay.classList.add('hidden'); showQuestion(); });

function showQuestion(){
    const q=questions[currentIndex];
    const hasAudio=!!q.audio;
    const timer=hasAudio?QUIZ_META.timerAudio:QUIZ_META.timerDefault;

    questionNumber.textContent='Domanda '+(currentIndex+1)+' di '+questions.length;
    questionCategory.textContent=catNames[q.cat]||q.cat;
    questionCategory.style.background=catColors[q.cat]||'#333';
    questionText.textContent=q.q;
    progressDisplay.textContent=(currentIndex+1)+' / '+questions.length;

    // Audio
    if(hasAudio){
        audioPlayer.style.display='';
        audioStarted=false;
        audioStatus.textContent='Premi ▶ per ascoltare';
        audioBar.style.width='0%';
        audioEl=new Audio('data:audio/mp3;base64,'+q.audio);
        audioEl.addEventListener('timeupdate',function(){ if(audioEl.duration) audioBar.style.width=(audioEl.currentTime/audioEl.duration*100)+'%'; });
        audioEl.addEventListener('ended',function(){ audioStatus.textContent='Fine spezzone'; });
    } else {
        audioPlayer.style.display='none';
        audioEl=null;
    }

    optionsContainer.innerHTML='';
    // Question image (e.g. art questions with a painting)
    const imgContainer = document.getElementById('questionImage');
    if(q.img){
        if(!imgContainer){ const d=document.createElement('div'); d.id='questionImage'; d.style.cssText='text-align:center;margin-bottom:16px;'; questionText.after(d); }
        document.getElementById('questionImage').innerHTML='<img src="'+q.img+'" style="max-width:100%;max-height:300px;border-radius:10px;" alt="Immagine domanda">';
    } else if(imgContainer){ imgContainer.innerHTML=''; }

    q.opts.forEach(function(opt,i){
        const btn=document.createElement('button');
        btn.className='option-btn'; btn.textContent=opt;
        btn.setAttribute('role','radio'); btn.setAttribute('aria-checked','false');
        btn.addEventListener('click',function(){ selectOption(i); });
        optionsContainer.appendChild(btn);
    });

    selectedOption=-1; answered=false; multiplierActive=false;
    confirmBtn.disabled=true; confirmBtn.style.display='';
    nextBtn.style.display='none'; contestBtn.style.display='none';
    contestArea.classList.remove('visible'); contestText.value='';
    feedbackEl.classList.remove('visible','correct-fb','wrong-fb'); feedbackEl.innerHTML='';
    multiplierBtn.style.display=multiplierRemaining>0?'':'none';
    multiplierBtn.classList.remove('used');

    if(hasAudio){ timerText.textContent='▶'; timerFill.style.width='100%'; timerFill.className='timer-fill'; }
    else { startTimer(timer); }
}

// Audio play
audioPlayBtn.addEventListener('click',function(){
    if(!audioEl||audioStarted) return;
    audioEl.play(); audioStarted=true; audioStatus.textContent='In riproduzione...';
    startTimer(QUIZ_META.timerAudio);
});
function startTimer(duration){
    timeLeft=duration; startTime=Date.now();
    timerFill.style.width='100%'; timerFill.className='timer-fill'; timerText.textContent=duration+'s';
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(function(){
        const elapsed=(Date.now()-startTime)/1000;
        timeLeft=Math.max(0,duration-elapsed);
        timerFill.style.width=(timeLeft/duration*100)+'%';
        timerText.textContent=Math.ceil(timeLeft)+'s';
        if(timeLeft<=5) timerFill.className='timer-fill danger';
        else if(timeLeft<=10) timerFill.className='timer-fill warning';
        else timerFill.className='timer-fill';
        if(timeLeft<=0){ clearInterval(timerInterval); timerInterval=null; handleTimeout(); }
    },100);
}
function stopTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }

function selectOption(i){ if(answered)return; selectedOption=i;
    optionsContainer.querySelectorAll('.option-btn').forEach(function(b,j){
        b.classList.toggle('selected',j===i); b.setAttribute('aria-checked',j===i?'true':'false');
    }); confirmBtn.disabled=false; }

multiplierBtn.addEventListener('click',function(){
    if(answered||multiplierRemaining<=0||multiplierActive)return;
    multiplierActive=true; multiplierRemaining--;
    multiplierBtn.classList.add('used');
    multiplierDisplay.textContent='⚡ x2 rimasti: '+multiplierRemaining+'/4';
});

confirmBtn.addEventListener('click',function(){ if(answered||selectedOption<0)return; stopTimer(); processAnswer(selectedOption); });
function handleTimeout(){ if(answered)return; processAnswer(-1); }

function getPenalty(){ if(score<0)return 25; if(score<=1000)return 75; if(score<=3000)return 150; return 300; }

function processAnswer(chosen){
    answered=true;
    const q=questions[currentIndex], correct=q.ans;
    const elapsed=(Date.now()-startTime)/1000;
    const hasAudio=!!q.audio;
    const maxTime=hasAudio?QUIZ_META.timerAudio:QUIZ_META.timerDefault;
    const timeUsed=Math.min(elapsed,maxTime);
    const isCorrect=chosen===correct, isTimeout=chosen===-1;

    optionsContainer.querySelectorAll('.option-btn').forEach(function(b,i){
        b.classList.add('disabled');
        if(i===correct) b.classList.add('correct');
        if(i===chosen&&!isCorrect) b.classList.add('wrong');
    });

    let pointsChange=0, streakBonus=0, fbText='';
    if(isCorrect){
        pointsChange=Math.max(100,Math.round(300-(timeUsed/maxTime)*200));
        if(multiplierActive) pointsChange*=2;
        streak++; if(streak>maxStreak) maxStreak=streak;
        if(streak===3) streakBonus=50; else if(streak===5) streakBonus=100; else if(streak===7) streakBonus=200;
        score+=pointsChange+streakBonus;
        fbText='✓ Corretto!<span class="points-change">+'+pointsChange+'</span>';
        if(streakBonus>0) fbText+='<span class="streak-bonus">+'+streakBonus+' streak!</span>';
        feedbackEl.className='feedback visible correct-fb';
    } else {
        let penalty=getPenalty(); if(multiplierActive) penalty=Math.round(penalty*1.5);
        pointsChange=-penalty; score+=pointsChange; streak=0;
        fbText=isTimeout?'⏱ Tempo scaduto!':'✗ Sbagliato!';
        fbText+='<span class="points-change">'+pointsChange+'</span>';
        fbText+='<br><small>Corretta: '+q.opts[correct]+'</small>';
        feedbackEl.className='feedback visible wrong-fb';
    }
    feedbackEl.innerHTML=fbText;
    scoreDisplay.textContent=score+' punti';
    streakDisplay.textContent=streak>=2?'🔥'+streak:'';
    confirmBtn.style.display='none'; multiplierBtn.style.display='none';
    nextBtn.style.display=''; contestBtn.style.display='';

    results.push({index:currentIndex,question:q.q,category:q.cat,options:q.opts,correct,chosen,isCorrect,isTimeout,points:pointsChange,streakBonus,multiplierUsed:multiplierActive,timeUsed,contest:''});
}

contestBtn.addEventListener('click',function(){ contestArea.classList.toggle('visible'); });
saveContestBtn.addEventListener('click',function(){ const t=contestText.value.trim(); if(t&&results.length>0) results[results.length-1].contest=t; contestArea.classList.remove('visible'); });

nextBtn.addEventListener('click',function(){ currentIndex++; if(currentIndex>=questions.length) showSummary(); else showIntro(); });
function showSummary(){
    questionCard.style.display='none'; $('scoreBar').style.display='none'; summary.classList.add('visible');
    const tot=results.length, corr=results.filter(r=>r.isCorrect).length;
    const avgT=(results.reduce((s,r)=>s+r.timeUsed,0)/tot).toFixed(1);
    summaryStats.innerHTML='<div class="stat-card"><div class="stat-value">'+score+'</div><div class="stat-label">Punteggio</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+corr+'/'+tot+'</div><div class="stat-label">Corrette</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+Math.round(corr/tot*100)+'%</div><div class="stat-label">Percentuale</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+maxStreak+'</div><div class="stat-label">Max Streak</div></div>'+
        '<div class="stat-card"><div class="stat-value">'+avgT+'s</div><div class="stat-label">Tempo medio</div></div>';
    let html='';
    results.forEach(function(r,i){
        const sc=r.isCorrect?'correct-r':'wrong-r';
        const st=r.isCorrect?'✓ Corretto':(r.isTimeout?'⏱ Timeout':'✗ Sbagliato');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        const bon=r.streakBonus>0?' (+'+r.streakBonus+' streak)':'';
        const mult=r.multiplierUsed?' [x2]':'';
        const cont=r.contest?'<div class="q-contest">📝 '+esc(r.contest)+'</div>':'';
        html+='<div class="summary-item" data-idx="'+i+'"><div class="q-head"><span class="q-num">#'+(i+1)+' - '+(catNames[r.category]||r.category)+'</span><span class="q-time">'+r.timeUsed.toFixed(1)+'s</span></div>'+
            '<div class="q-result '+sc+'">'+st+' '+pts+bon+mult+'</div>'+
            '<div class="q-explanation" id="exp-'+i+'"><strong>Domanda:</strong> '+esc(r.question)+'<br><strong>Corretta:</strong> '+esc(r.options[r.correct])+'<br>'+
            (r.chosen>=0&&!r.isCorrect?'<strong>Tua:</strong> '+esc(r.options[r.chosen])+'<br>':'')+
            '</div>'+cont+'</div>';
    });
    summaryList.innerHTML=html;
    summaryList.addEventListener('click',function(e){ const item=e.target.closest('.summary-item'); if(!item)return; const exp=$('exp-'+item.dataset.idx); if(exp) exp.classList.toggle('visible'); });
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

shareBtn.addEventListener('click',function(){
    const corr=results.filter(r=>r.isCorrect).length;
    let t='🎯 QUIZZONE — '+QUIZ_META.title+'\n👤 '+playerName+'\n🏆 '+score+' punti\n✅ '+corr+'/'+questions.length+'\n🔥 Max streak: '+maxStreak+'\n\n';
    results.forEach(function(r,i){
        const ic=r.isCorrect?'✅':(r.isTimeout?'⏱️':'❌');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        const bon=r.streakBonus>0?' (+'+r.streakBonus+')':'';
        const mult=r.multiplierUsed?' [x2]':'';
        t+=ic+' #'+(i+1)+' '+(catNames[r.category]||r.category)+' — '+pts+bon+mult+' ('+r.timeUsed.toFixed(1)+'s)\n';
        if(r.contest) t+='   📝 '+r.contest+'\n';
    });
    navigator.clipboard.writeText(t).then(()=>{shareMsg.classList.add('visible');setTimeout(()=>shareMsg.classList.remove('visible'),3000);}).catch(()=>{
        const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
        shareMsg.classList.add('visible');setTimeout(()=>shareMsg.classList.remove('visible'),3000);
    });
});

saveFileBtn.addEventListener('click',function(){
    const corr=results.filter(r=>r.isCorrect).length;
    let t='QUIZZONE — '+QUIZ_META.title+'\nGiocatore: '+playerName+'\nPunteggio: '+score+'\nCorrette: '+corr+'/'+questions.length+'\nMax streak: '+maxStreak+'\n'+'='.repeat(50)+'\n\n';
    results.forEach(function(r,i){
        const st=r.isCorrect?'CORRETTO':(r.isTimeout?'TIMEOUT':'SBAGLIATO');
        const pts=r.points>=0?'+'+r.points:''+r.points;
        t+='#'+(i+1)+' ['+( catNames[r.category]||r.category)+'] '+st+' '+pts;
        if(r.streakBonus>0) t+=' (+'+r.streakBonus+' streak)';
        if(r.multiplierUsed) t+=' [x2]';
        t+=' ('+r.timeUsed.toFixed(1)+'s)\n  Q: '+r.question+'\n  Corretta: '+r.options[r.correct]+'\n';
        if(r.chosen>=0&&!r.isCorrect) t+='  Tua: '+r.options[r.chosen]+'\n';
        if(r.contest) t+='  CONTESTAZIONE: '+r.contest+'\n';
        t+='\n';
    });
    const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=QUIZ_META.filename+'_'+playerName.replace(/\s+/g,'_')+'.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
});

})();
</script>
</body>
</html>
