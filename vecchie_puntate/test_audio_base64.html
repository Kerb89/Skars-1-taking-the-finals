<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Audio Base64</title>
    <style>
        body {
            font-family: sans-serif;
            background: #0f1923;
            color: #e0e6ed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #1a2a3a;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h2 { margin-bottom: 20px; }
        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #4fc3f7;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .play-btn:hover { background: #29b6f6; }
        .play-btn:disabled { background: #546e7a; cursor: not-allowed; }
        .play-btn svg { fill: #0f1923; width: 30px; height: 30px; }
        .status { color: #8899aa; margin-top: 10px; }
        .drop-zone {
            border: 2px dashed #4fc3f7;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .drop-zone:hover, .drop-zone.drag-over { background: #223344; }
        .drop-zone p { color: #8899aa; }
        .success { color: #66bb6a; }
        input[type="file"] { display: none; }
        .base64-output {
            margin-top: 16px;
            background: #0f1923;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.75rem;
            color: #546e7a;
            max-height: 100px;
            overflow: auto;
            word-break: break-all;
            display: none;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #37474f;
            color: #e0e6ed;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }
        .copy-btn:hover { background: #455a64; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎵 Test Audio — Trascina il file MP3</h2>
        
        <div class="drop-zone" id="dropZone">
            <p>Trascina qui il file MP3 dello spezzone<br>oppure clicca per selezionarlo</p>
            <input type="file" id="fileInput" accept="audio/*">
        </div>

        <button class="play-btn" id="playBtn" disabled>
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <div class="status" id="status">Carica un file audio per testare</div>
        
        <div class="base64-output" id="base64Output"></div>
        <button class="copy-btn" id="copyBtn">Copia base64 negli appunti</button>
    </div>

    <script>
    let audio = null;
    let isPlaying = false;
    let base64String = '';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const base64Output = document.getElementById('base64Output');
    const copyBtn = document.getElementById('copyBtn');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', (e) => { if (e.target.files.length) loadFile(e.target.files[0]); });

    function loadFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            base64String = dataUrl.split(',')[1];
            
            audio = new Audio(dataUrl);
            playBtn.disabled = false;
            status.innerHTML = '<span class="success">✓ File caricato: ' + file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)</span>';
            dropZone.innerHTML = '<p class="success">✓ ' + file.name + ' caricato!</p>';
            
            // Mostra anteprima base64
            base64Output.style.display = 'block';
            base64Output.textContent = base64String.substring(0, 200) + '... (' + base64String.length + ' caratteri totali)';
            copyBtn.style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
    }

    playBtn.addEventListener('click', function() {
        if (!audio) return;
        if (isPlaying) {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            status.textContent = 'Fermato';
            this.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#0f1923"/></svg>';
        } else {
            audio.play().then(() => {
                isPlaying = true;
                status.textContent = '♪ In riproduzione...';
                this.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" fill="#0f1923"/><rect x="14" y="4" width="4" height="16" fill="#0f1923"/></svg>';
            }).catch(err => {
                status.textContent = 'Errore: ' + err.message;
            });
        }
    });

    if (audio) {
        audio.addEventListener('ended', () => {
            isPlaying = false;
            status.textContent = 'Terminato — premi ▶ per riascoltare';
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#0f1923"/></svg>';
        });
    }

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(base64String).then(() => {
            copyBtn.textContent = '✓ Copiato!';
            setTimeout(() => { copyBtn.textContent = 'Copia base64 negli appunti'; }, 2000);
        });
    });
    </script>
</body>
</html>
