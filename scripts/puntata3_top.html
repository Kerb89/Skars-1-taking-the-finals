<body>

    <script>
    let playerName = '';

    { q: "Quale paese ha vinto l'Eurovision Song Contest 2026 a Vienna con la canzone \"Bangaranga\"?", opts: ["Serbia", "Israele", "Grecia", "Bulgaria"], ans: 3, expl: "La Bulgaria ha vinto con Dara e \"Bangaranga\", primo trionfo bulgaro all'Eurovision." },
    { q: "In quale linguaggio di programmazione \u00e8 stato originariamente scritto il videogioco Minecraft?", opts: ["C++", "Python", "Java", "C#"], ans: 2, expl: "Minecraft \u00e8 stato scritto in Java da Markus \"Notch\" Persson nel 2009." },
    { q: "Quale gas costituisce circa il 78% dell'atmosfera terrestre?", opts: ["Ossigeno", "Azoto", "Anidride carbonica", "Argon"], ans: 1, expl: "L'azoto costituisce circa il 78% dell'atmosfera, l'ossigeno il 21%." },
    { q: "Nel tennis, come si chiama il colpo che si effettua al volo prima che la palla tocchi terra?", opts: ["Smash", "Passante", "Drop shot", "Vol\u00e9e"], ans: 3, expl: "La vol\u00e9e \u00e8 il colpo al volo, lo smash \u00e8 la schiacciata dall'alto." },
    { q: "Quale civilt\u00e0 antica costru\u00ec Machu Picchu, la cittadella situata a 2.430 m nelle Ande peruviane?", opts: ["Maya", "Azteca", "Inca", "Olmeca"], ans: 2, expl: "Gli Inca costruirono Machu Picchu nel XV secolo." },
    { q: "Quanti litri di acqua si consiglia di bere al giorno per un adulto medio secondo le linee guida generali?", opts: ["2 litri", "1 litro", "3 litri", "4 litri"], ans: 0, expl: "Le linee guida generali indicano circa 2 litri al giorno per un adulto." },
    { q: "Qual \u00e8 la distanza media tra la Terra e la Luna, arrotondata alle migliaia di km?", opts: ["384.000 km", "150.000 km", "450.000 km", "240.000 km"], ans: 0, expl: "La distanza media Terra-Luna \u00e8 circa 384.400 km." },
    { q: "Continua la sequenza: 2, 6, 12, 20, 30, ...", opts: ["40", "44", "36", "42"], ans: 3, expl: "La sequenza \u00e8 n\u00d7(n+1): 1\u00d72=2, 2\u00d73=6, 3\u00d74=12, 4\u00d75=20, 5\u00d76=30, 6\u00d77=42." },
    { q: "Quale di queste frasi \u00e8 presente nel testo della canzone \"Bohemian Rhapsody\" dei Queen?", opts: ["\"I see a little silhouetto of a man\"", "\"I see a little shadow of a man\"", "\"I see a little silhouette of a boy\"", "\"I see a dark silhouetto of a man\""], ans: 0, expl: "Il testo esatto \u00e8 \"I see a little silhouetto of a man\" con la -o finale." },

    { q: "In quale film d'animazione Pixar del 2009, un anziano lega migliaia di palloncini alla sua casa per volare in Sud America?", opts: ["Wall-E", "Up", "Coco", "Inside Out"], ans: 1, expl: "Up, con il protagonista Carl Fredricksen." },
    { q: "Quale arcipelago europeo, situato nell'Oceano Atlantico a circa 1.000 km dal Portogallo, ha come capoluogo Funchal?", opts: ["Canarie", "Azzorre", "Madeira", "Capo Verde"], ans: 2, expl: "Madeira \u00e8 un arcipelago portoghese con capoluogo Funchal. Le Azzorre hanno Ponta Delgada." },
    { q: "Quale figura retorica consiste nel ripetere la stessa parola o gruppo di parole all'inizio di versi o frasi successive?", opts: ["Epifora", "Allitterazione", "Chiasmo", "Anafora"], ans: 3, expl: "L'anafora \u00e8 la ripetizione a inizio verso. L'epifora \u00e8 a fine verso." },

    { q: "Quale nazione africana, attraversata dall'equatore, ha Nairobi come capitale?", opts: ["Tanzania", "Kenya", "Uganda", "Etiopia"], ans: 1, expl: "Il Kenya ha Nairobi come capitale ed \u00e8 attraversato dall'equatore." },
