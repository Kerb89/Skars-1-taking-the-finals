name: Upload Quiz Stats

on:
  repository_dispatch:
    types: [quiz-result]

jobs:
  save-result:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Save quiz result JSON
        run: |
          mkdir -p stats/results
          PLAYER=$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.playerName' | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
          QUIZ=$(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.quizId')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="stats/results/${QUIZ}_${PLAYER}_${TIMESTAMP}.json"
          echo '${{ toJSON(github.event.client_payload) }}' | jq '.' > "$FILENAME"
          echo "Saved to $FILENAME"

      - name: Commit and push
        run: |
          git config user.name "Quiz Bot"
          git config user.email "quiz-bot@users.noreply.github.com"
          git add stats/results/
          git commit -m "📊 Risultati quiz: $(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.playerName') - $(echo '${{ toJSON(github.event.client_payload) }}' | jq -r '.quizId')" || echo "Nothing to commit"
          git push
