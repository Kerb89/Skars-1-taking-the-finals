<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzone — Misto — 2026-06-16</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            color: white;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        .score-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .score-bar .progress { font-weight: 600; color: #667eea; }
        .score-bar .score { font-weight: 600; color: #27ae60; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎯 Il Quizzone</h1>
        <p>Misto — 16 giugno 2026 — 30 domande</p>
    </div>
    <div class="score-bar">
        <span class="progress" id="progress">Domanda 1/30</span>
        <span class="score" id="scoreDisplay">Punteggio: 0/30</span>
    </div>
    <div id="quizArea"></div>
    <div id="summaryArea" style="display:none;"></div>
</div>
<style>
        .question-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .question-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-right: 10px;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateX(4px);
        }
        .option-btn:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
        }
        .option-btn.selected {
            border-color: #667eea;
            background: #ede7f6;
        }
        .option-btn.correct {
            border-color: #27ae60;
            background: #e8f5e9;
            color: #1b5e20;
        }
        .option-btn.wrong {
            border-color: #e74c3c;
            background: #fce4ec;
            color: #b71c1c;
        }
        .option-btn:disabled { cursor: default; transform: none; }
</style>
<style>
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn:focus { outline: 3px solid #667eea; outline-offset: 2px; }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #5a6fd6; }
        .btn-primary:disabled { background: #ccc; cursor: default; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .btn-contest {
            background: #fff3e0;
            color: #e65100;
            border: 2px solid #ffcc80;
        }
        .btn-contest:hover { background: #ffe0b2; }
        .btn-share {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #a5d6a7;
        }
        .btn-share:hover { background: #c8e6c9; }
        .contest-area {
            margin-top: 16px;
            display: none;
        }
        .contest-area textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffcc80;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 60px;
        }
        .contest-area textarea:focus {
            outline: none;
            border-color: #e65100;
        }
        .contest-saved {
            color: #e65100;
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 600;
        }
</style>
<style>
        .summary {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        .summary h2 { margin-bottom: 16px; color: #667eea; }
        .summary-score {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }
        .summary-score.great { color: #27ae60; }
        .summary-score.ok { color: #f39c12; }
        .summary-score.bad { color: #e74c3c; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.8rem; color: #666; margin-top: 4px; }
        .results-list { margin-top: 20px; }
        .result-item {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }
        .result-item.correct-item { background: #e8f5e9; }
        .result-item.wrong-item { background: #fce4ec; }
        .result-item .q-text { flex: 1; font-size: 0.9rem; }
        .result-item .q-detail { font-size: 0.8rem; color: #555; margin-top: 4px; }
        .result-item .q-contest { font-size: 0.8rem; color: #e65100; margin-top: 4px; font-style: italic; }
        .result-badge {
            min-width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: white;
        }
        .result-badge.ok { background: #27ae60; }
        .result-badge.ko { background: #e74c3c; }
        .share-box {
            margin-top: 20px;
            padding: 16px;
            background: #f0f4f8;
            border-radius: 10px;
            display: none;
        }
        .share-box textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            font-size: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            resize: vertical;
        }
        .copied-msg {
            color: #27ae60;
            font-weight: 600;
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
</style>
<style>
        .upload-btn { display: block; width: 100%; padding: 14px; background: #2e7d32; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        .upload-btn:hover { background: #388e3c; }
        .upload-btn:disabled { background: #546e7a; color: #90a4ae; cursor: not-allowed; }
        .upload-msg { text-align: center; font-size: 0.85rem; margin-top: 8px; display: none; }
        .upload-msg.visible { display: block; }
        .upload-msg.success { color: #66bb6a; }
        .upload-msg.error { color: #ef5350; }
</style>
<script>
const quizData = [
    { q: "Qual è il lago più profondo del mondo e qual è approssimativamente la sua profondità massima?", options: ["Lago Tanganica — circa 1.470 m", "Lago Baikal — circa 1.640 m", "Lago Malawi — circa 1.500 m", "Lago Baikal — circa 2.100 m"], correct: 1 },
    { q: "In quale linguaggio di programmazione è stato scritto il kernel di Linux?", options: ["C++", "C", "Assembly", "Rust"], correct: 1 },
    { q: "Quale particella subatomica ha carica elettrica frazionaria pari a +2/3?", options: ["Quark down", "Quark up", "Positrone", "Muone"], correct: 1 },
    { q: "Chi ha vinto il Pallone d'Oro maschile nel settembre 2025?", options: ["Lamine Yamal", "Vinícius Jr.", "Ousmane Dembélé", "Mohamed Salah"], correct: 2 },
    { q: "Il Protocollo di Kyoto sui cambiamenti climatici è stato adottato nel 1997. In quale anno è entrato in vigore?", options: ["2001", "2003", "2005", "2008"], correct: 2 },
    { q: "Il \"quinto gusto\" umami è stato identificato scientificamente per la prima volta da un chimico giapponese. Di quale amminoacido si tratta principalmente?", options: ["Acido aspartico", "Glutammato monosodico (acido glutammico)", "Lisina", "Triptofano"], correct: 1 },
    { q: "Il film \"One Battle After Another\" ha vinto l'Oscar come Miglior Film alla 98ª cerimonia (2026). Chi lo ha diretto?", options: ["Denis Villeneuve", "Paul Thomas Anderson", "Christopher Nolan", "Martin Scorsese"], correct: 1 },
    { q: "Qual è il valore di log₂(1024)?", options: ["8", "9", "10", "12"], correct: 2 },
    { q: "Chi ha composto la \"Sagra della Primavera\" (Le Sacre du Printemps), la cui prima a Parigi nel 1913 provocò un celebre scandalo?", options: ["Sergej Prokof'ev", "Claude Debussy", "Igor' Stravinskij", "Maurice Ravel"], correct: 2 },
    { q: "Quale regista ha diretto sia \"Mulholland Drive\" (2001) sia \"Inland Empire\" (2006)?", options: ["Terrence Malick", "David Lynch", "Darren Aronofsky", "Lars von Trier"], correct: 1 },
    { q: "Nel romanzo \"Cent'anni di solitudine\" di García Márquez, quale famiglia è al centro della vicenda?", options: ["Famiglia Buendía", "Famiglia Arcaya", "Famiglia Trueba", "Famiglia Iguarán"], correct: 0 },
    { q: "Guernica di Picasso fu dipinta nel 1937 in risposta al bombardamento dell'omonima città. Durante quale conflitto avvenne quel bombardamento?", options: ["Seconda guerra mondiale", "Guerra civile spagnola", "Prima guerra mondiale", "Guerra del Rif"], correct: 1 },
    { q: "Quale figura retorica consiste nell'attribuzione di qualità umane a oggetti o concetti astratti?", options: ["Metonimia", "Sinestesia", "Prosopopea (personificazione)", "Ipallage"], correct: 2 },
    { q: "(Deutsch) Was bedeutet das Wort \"Schadenfreude\" auf Italienisch?", options: ["Tristezza profonda", "Gioia per la sfortuna altrui", "Paura del futuro", "Senso di colpa"], correct: 1 },
    { q: "Which literary device is used in the sentence: \"The stars danced playfully in the moonlit sky\"?", options: ["Simile", "Personification", "Hyperbole", "Metonymy"], correct: 1 },
    { q: "Qual è la capitale del Burkina Faso?", options: ["Bamako", "Niamey", "Ouagadougou", "Lomé"], correct: 2 },
    { q: "In un sistema operativo, cosa gestisce il componente chiamato \"scheduler\"?", options: ["L'allocazione della memoria virtuale", "L'assegnazione del tempo di CPU ai processi", "La comunicazione tra dispositivi di rete", "La compressione dei file su disco"], correct: 1 },
    { q: "Quante ossa compongono lo scheletro umano adulto?", options: ["186", "206", "226", "196"], correct: 1 },
    { q: "Il PSG ha vinto la Champions League 2024-25 battendo l'Inter in finale. Con quale punteggio?", options: ["3-1", "2-0", "5-0", "4-2"], correct: 2 },
    { q: "In quale anno il Giappone attaccò Pearl Harbor, provocando l'ingresso degli Stati Uniti nella Seconda guerra mondiale?", options: ["1939", "1940", "1941", "1942"], correct: 2 },
    { q: "La fermentazione lattica produce acido lattico a partire dal glucosio. Quante molecole di ATP nette si ottengono per molecola di glucosio?", options: ["2", "4", "36", "1"], correct: 0 },
    { q: "Qual è il numero primo più grande tra questi?", options: ["97", "91", "93", "99"], correct: 0 },
    { q: "Chi ha vinto il Premio Nobel per la Letteratura nel 2025?", options: ["Mircea Cărtărescu", "László Krasznahorkai", "Ngugi wa Thiong'o", "Haruki Murakami"], correct: 1 },
    { q: "Quale protocollo di rete opera al livello di trasporto del modello OSI e garantisce la consegna ordinata dei pacchetti?", options: ["UDP", "HTTP", "TCP", "ICMP"], correct: 2 },
    { q: "Il fiume più lungo dell'Africa è il Nilo. Quale paese ne ospita la foce?", options: ["Sudan", "Etiopia", "Egitto", "Uganda"], correct: 2 },
    { q: "In quale film del 1979 un equipaggio spaziale incontra una creatura aliena mortale a bordo della nave Nostromo?", options: ["Solaris", "Alien", "2001: Odissea nello spazio", "Moon"], correct: 1 },
    { q: "Quale tipo di colesterolo è comunemente chiamato \"colesterolo buono\"?", options: ["LDL", "HDL", "VLDL", "Trigliceridi"], correct: 1 },
    { q: "(Français) Quel est le temps verbal utilisé dans la phrase : \"J'eusse aimé vivre à cette époque\" ?", options: ["Conditionnel passé première forme", "Subjonctif plus-que-parfait", "Passé antérieur", "Conditionnel passé deuxième forme"], correct: 3 },
    { q: "Quale artista realizzò la \"Vocazione di San Matteo\", conservata nella Chiesa di San Luigi dei Francesi a Roma?", options: ["Guido Reni", "Caravaggio", "Annibale Carracci", "Gian Lorenzo Bernini"], correct: 1 },
    { q: "Quanto fa la somma dei primi 20 numeri naturali (da 1 a 20)?", options: ["190", "200", "210", "220"], correct: 2 }
];

const labels = ['A', 'B', 'C', 'D'];
let currentQ = 0;
let score = 0;
let answers = new Array(30).fill(null);
let contests = new Array(30).fill('');
let answered = new Array(30).fill(false);
let startTimes = new Array(30).fill(0);
let times = new Array(30).fill(0);
let quizStartTime = Date.now();

function renderQuestion() {
    const area = document.getElementById('quizArea');
    const data = quizData[currentQ];
    startTimes[currentQ] = Date.now();

    let html = '<div class="question-card">';
    html += '<div class="question-text"><span class="question-number">' + (currentQ + 1) + '</span>' + data.q + '</div>';
    html += '<div class="options" role="radiogroup" aria-label="Opzioni di risposta">';

    for (let i = 0; i < data.options.length; i++) {
        const disabled = answered[currentQ] ? 'disabled' : '';
        let cls = 'option-btn';
        if (answered[currentQ]) {
            if (i === data.correct) cls += ' correct';
            else if (i === answers[currentQ] && i !== data.correct) cls += ' wrong';
        } else if (answers[currentQ] === i) {
            cls += ' selected';
        }
        html += '<button class="' + cls + '" ' + disabled + ' onclick="selectOption(' + i + ')" role="radio" aria-checked="' + (answers[currentQ] === i) + '" aria-label="Opzione ' + labels[i] + '">';
        html += '<strong>' + labels[i] + ')</strong> ' + data.options[i];
        html += '</button>';
    }
    html += '</div>';

    html += '<div class="btn-row">';
    if (currentQ > 0) {
        html += '<button class="btn btn-secondary" onclick="prevQuestion()">← Indietro</button>';
    }
    if (!answered[currentQ]) {
        html += '<button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()" ' + (answers[currentQ] === null ? 'disabled' : '') + '>Conferma</button>';
    } else {
        html += '<button class="btn btn-contest" onclick="toggleContest()">⚠️ Contesta domanda</button>';
        if (currentQ < 29) {
            html += '<button class="btn btn-primary" onclick="nextQuestion()">Avanti →</button>';
        } else {
            html += '<button class="btn btn-primary" onclick="showSummary()">Vedi risultati</button>';
        }
    }
    html += '</div>';

    html += '<div class="contest-area" id="contestArea">';
    html += '<textarea id="contestText" placeholder="Scrivi la tua contestazione..." oninput="saveContest()">' + contests[currentQ] + '</textarea>';
    if (contests[currentQ]) html += '<div class="contest-saved">✓ Contestazione salvata</div>';
    html += '</div>';

    html += '</div>';
    area.innerHTML = html;

    if (contests[currentQ] && answered[currentQ]) {
        document.getElementById('contestArea').style.display = 'block';
    }

    document.getElementById('progress').textContent = 'Domanda ' + (currentQ + 1) + '/30';
    document.getElementById('scoreDisplay').textContent = 'Punteggio: ' + score + '/30';
}

function selectOption(idx) {
    if (answered[currentQ]) return;
    answers[currentQ] = idx;
    renderQuestion();
}

function confirmAnswer() {
    if (answers[currentQ] === null) return;
    answered[currentQ] = true;
    times[currentQ] = ((Date.now() - startTimes[currentQ]) / 1000).toFixed(1);
    if (answers[currentQ] === quizData[currentQ].correct) score++;
    renderQuestion();
}

function nextQuestion() {
    if (currentQ < 29) { currentQ++; renderQuestion(); }
}

function prevQuestion() {
    if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function toggleContest() {
    const area = document.getElementById('contestArea');
    area.style.display = area.style.display === 'none' ? 'block' : 'none';
    if (area.style.display === 'block') {
        document.getElementById('contestText').focus();
    }
}

function saveContest() {
    contests[currentQ] = document.getElementById('contestText').value;
}

function showSummary() {
    document.getElementById('quizArea').style.display = 'none';
    document.querySelector('.score-bar').style.display = 'none';
    const area = document.getElementById('summaryArea');
    area.style.display = 'block';

    const pct = Math.round((score / 30) * 100);
    const totalTime = ((Date.now() - quizStartTime) / 1000 / 60).toFixed(1);
    const avgTime = (times.reduce((a, b) => a + parseFloat(b), 0) / 30).toFixed(1);
    const numContests = contests.filter(c => c.trim() !== '').length;

    let scoreClass = 'bad';
    if (pct >= 70) scoreClass = 'great';
    else if (pct >= 40) scoreClass = 'ok';

    let html = '<div class="summary">';
    html += '<h2>🏆 Riepilogo finale</h2>';
    html += '<div class="summary-score ' + scoreClass + '">' + score + '/30</div>';
    html += '<div style="text-align:center;color:#666;margin-bottom:20px;">' + pct + '% di risposte corrette</div>';

    html += '<div class="stats-grid">';
    html += '<div class="stat-card"><div class="stat-value" style="color:#27ae60">' + score + '</div><div class="stat-label">Corrette</div></div>';
    html += '<div class="stat-card"><div class="stat-value" style="color:#e74c3c">' + (30 - score) + '</div><div class="stat-label">Sbagliate</div></div>';
    html += '<div class="stat-card"><div class="stat-value" style="color:#667eea">' + totalTime + ' min</div><div class="stat-label">Tempo totale</div></div>';
    html += '<div class="stat-card"><div class="stat-value" style="color:#f39c12">' + avgTime + ' s</div><div class="stat-label">Media/domanda</div></div>';
    if (numContests > 0) {
        html += '<div class="stat-card"><div class="stat-value" style="color:#e65100">' + numContests + '</div><div class="stat-label">Contestazioni</div></div>';
    }
    html += '</div>';

    html += '<div class="btn-row" style="justify-content:center;margin:20px 0;">';
    html += '<button class="btn btn-share" onclick="toggleShareBox()">📋 Condividi risultati</button>';
    html += '<button class="btn btn-secondary" onclick="location.reload()">🔄 Ricomincia</button>';
    html += '</div>';
    html += '<div class="share-box" id="shareBox"><textarea id="shareText" readonly></textarea><button class="btn btn-primary" style="margin-top:8px;" onclick="copyResults()">Copia negli appunti</button><div class="copied-msg" id="copiedMsg">✓ Copiato!</div></div>';
    html += '<button class="upload-btn" id="uploadBtn" onclick="uploadResults()">\u2601\uFE0F Carica risultati online</button>';
    html += '<div class="upload-msg" id="uploadMsg"></div>';

    html += '<h3 style="margin:20px 0 12px;color:#333;">Dettaglio risposte</h3>';
    html += '<div class="results-list">';

    for (let i = 0; i < 30; i++) {
        const isCorrect = answers[i] === quizData[i].correct;
        const itemClass = isCorrect ? 'correct-item' : 'wrong-item';
        const badgeClass = isCorrect ? 'ok' : 'ko';
        const badgeText = isCorrect ? '✓' : '✗';

        html += '<div class="result-item ' + itemClass + '">';
        html += '<div class="result-badge ' + badgeClass + '">' + badgeText + '</div>';
        html += '<div class="q-text">';
        html += '<strong>' + (i + 1) + '.</strong> ' + quizData[i].q.substring(0, 80) + (quizData[i].q.length > 80 ? '...' : '');
        if (!isCorrect) {
            html += '<div class="q-detail">Tua: <strong>' + labels[answers[i]] + '</strong> — Corretta: <strong>' + labels[quizData[i].correct] + ') ' + quizData[i].options[quizData[i].correct] + '</strong></div>';
        }
        if (contests[i].trim()) {
            html += '<div class="q-contest">⚠️ Contestazione: ' + contests[i] + '</div>';
        }
        html += '</div></div>';
    }

    html += '</div></div>';
    area.innerHTML = html;
}

function toggleShareBox() {
    const box = document.getElementById('shareBox');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
    if (box.style.display === 'block') {
        document.getElementById('shareText').value = generateShareText();
    }
}

function generateShareText() {
    const pct = Math.round((score / 30) * 100);
    const totalTime = ((Date.now() - quizStartTime) / 1000 / 60).toFixed(1);
    let text = '🎯 IL QUIZZONE — Misto — 16/06/2026\n';
    text += '━━━━━━━━━━━━━━━━━━━━━\n';
    text += '🏆 Punteggio: ' + score + '/30 (' + pct + '%)\n';
    text += '⏱️ Tempo: ' + totalTime + ' minuti\n';
    text += '━━━━━━━━━━━━━━━━━━━━━\n\n';

    const wrong = [];
    const contested = [];
    for (let i = 0; i < 30; i++) {
        if (answers[i] !== quizData[i].correct) {
            wrong.push((i+1) + '. ' + quizData[i].q.substring(0, 60) + '... → ' + labels[answers[i]] + ' (corretta: ' + labels[quizData[i].correct] + ')');
        }
        if (contests[i].trim()) {
            contested.push((i+1) + '. ' + contests[i]);
        }
    }

    if (wrong.length > 0) {
        text += '❌ ERRORI (' + wrong.length + '):\n';
        wrong.forEach(w => { text += '  • ' + w + '\n'; });
        text += '\n';
    }
    if (contested.length > 0) {
        text += '⚠️ CONTESTAZIONI (' + contested.length + '):\n';
        contested.forEach(c => { text += '  • ' + c + '\n'; });
    }
    return text;
}

function copyResults() {
    const text = document.getElementById('shareText').value;
    if (navigator.share) {
        navigator.share({ title: 'Quizzone — Risultati', text: text }).catch(() => {
            fallbackCopy(text);
        });
    } else {
        fallbackCopy(text);
    }
}

function fallbackCopy(text) {
    navigator.clipboard.writeText(text).then(() => {
        const msg = document.getElementById('copiedMsg');
        msg.style.display = 'block';
        setTimeout(() => { msg.style.display = 'none'; }, 2500);
    }).catch(() => {
        document.getElementById('shareText').select();
    });
}
