            ans: 2,
            expl: "Éphémère deriva dal greco ephemeros (che dura un giorno). Indica qualcosa di transitorio, passeggero. È l'opposto di 'eterno'."
        },
        {
            q: "Quale alimento è la principale fonte alimentare di licopene, un potente antiossidante carotenoide?",
            opts: ["Carota", "Pomodoro", "Spinaci", "Peperone rosso"],
            ans: 1,
            expl: "Il pomodoro (soprattutto cotto o concentrato) è la fonte più ricca di licopene. La carota è ricca di beta-carotene, non licopene."
        },
        {
            q: "Chi ha composto \"Il barbiere di Siviglia\", opera buffa rappresentata per la prima volta a Roma nel 1816?",
            opts: ["Giuseppe Verdi", "Gaetano Donizetti", "Wolfgang Amadeus Mozart", "Gioachino Rossini"],
            ans: 3,
            expl: "Rossini compose Il barbiere di Siviglia a 24 anni. Mozart compose Le nozze di Figaro, che è il sequel della stessa storia di Beaumarchais."
        }
    ];

    // State
    let currentQ = 0;
    let score = 0;
    let selectedOpt = -1;
    let confirmed = false;
    let timerInterval = null;
    let timeLeft = 15;
    let startTime = 0;
    const results = [];
    const contests = {};
    const TIMER_DURATION = 20;

    // DOM
    const scoreDisplay = document.getElementById('scoreDisplay');
    const progressDisplay = document.getElementById('progressDisplay');
    const timerFill = document.getElementById('timerFill');
    const timerText = document.getElementById('timerText');
    const questionNumber = document.getElementById('questionNumber');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const confirmBtn = document.getElementById('confirmBtn');
    const contestBtn = document.getElementById('contestBtn');
    const contestArea = document.getElementById('contestArea');
    const contestTextEl = document.getElementById('contestText');
    const saveContestBtn = document.getElementById('saveContestBtn');
    const nextBtn = document.getElementById('nextBtn');
    const questionCard = document.getElementById('questionCard');
    const summary = document.getElementById('summary');

    function startTimer() {
        timeLeft = TIMER_DURATION;
        startTime = Date.now();
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            timeLeft = Math.max(0, TIMER_DURATION - elapsed);
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 100);
    }

    function updateTimerDisplay() {
        const pct = (timeLeft / TIMER_DURATION) * 100;
        timerFill.style.width = pct + '%';
        timerText.textContent = Math.ceil(timeLeft) + 's';
        timerFill.classList.remove('warning', 'danger');
        if (timeLeft <= 5) timerFill.classList.add('danger');
        else if (timeLeft <= 10) timerFill.classList.add('warning');
    }

    function stopTimer() {
        clearInterval(timerInterval);
    }

    function getElapsed() {
        return (Date.now() - startTime) / 1000;
    }

    function calcPoints(elapsed, isCorrect) {
        if (!isCorrect) {
            if (score < 0) return -25;
            if (score <= 1000) return -75;
            if (score <= 3000) return -150;
            return -300;
        }
        const pts = Math.round(300 - (elapsed / TIMER_DURATION) * 200);
        return Math.max(100, pts);
    }

    function renderQuestion() {
        const q = quizData[currentQ];
        questionNumber.textContent = 'Domanda ' + (currentQ + 1) + ' di 30';
        if (q.extreme) {
            questionText.innerHTML = '<span class="extreme-badge">Estremo</span> ' + escapeHtml(q.q);
        } else {
            questionText.textContent = q.q;
        }
        progressDisplay.textContent = (currentQ + 1) + ' / 30';

        optionsContainer.innerHTML = '';
        const labels = ['A', 'B', 'C', 'D'];
        q.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = labels[i] + ') ' + opt;
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', 'false');
            btn.setAttribute('aria-label', labels[i] + ': ' + opt);
            btn.addEventListener('click', () => selectOption(i));
            optionsContainer.appendChild(btn);
        });

        selectedOpt = -1;
        confirmed = false;
        confirmBtn.disabled = true;
        confirmBtn.style.display = '';
        nextBtn.style.display = 'none';
        contestBtn.style.display = 'none';
        contestArea.classList.remove('visible');
        contestTextEl.value = '';
        feedback.classList.remove('visible', 'correct-fb', 'wrong-fb');
        feedback.style.display = 'none';

        startTimer();
    }

    function selectOption(i) {
        if (confirmed) return;
        selectedOpt = i;
        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach((btn, idx) => {
            btn.classList.toggle('selected', idx === i);
            btn.setAttribute('aria-checked', idx === i ? 'true' : 'false');
        });
        confirmBtn.disabled = false;
    }

    function handleConfirm() {
        if (selectedOpt < 0 || confirmed) return;
        stopTimer();
        const elapsed = getElapsed();
        revealAnswer(selectedOpt, elapsed);
    }

    function handleTimeout() {
        if (confirmed) return;
        confirmed = true;
        const elapsed = TIMER_DURATION;
        const q = quizData[currentQ];
        const pts = calcPoints(elapsed, false);
        score += pts;

        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === q.ans) btn.classList.add('correct');
        });

        results.push({ qIdx: currentQ, chosen: -1, correct: q.ans, isCorrect: false, time: elapsed, points: pts });
        showFeedback(false, pts);
        scoreDisplay.textContent = score + ' punti';
        confirmBtn.style.display = 'none';
        contestBtn.style.display = '';
        nextBtn.style.display = '';
    }

    function revealAnswer(chosen, elapsed) {
        confirmed = true;
        const q = quizData[currentQ];
        const isCorrect = chosen === q.ans;
        const pts = calcPoints(elapsed, isCorrect);
        score += pts;

        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach((btn, i) => {
            btn.classList.add('disabled');
            if (i === q.ans) btn.classList.add('correct');
            if (i === chosen && !isCorrect) btn.classList.add('wrong');
        });

        results.push({ qIdx: currentQ, chosen, correct: q.ans, isCorrect, time: elapsed, points: pts });
        showFeedback(isCorrect, pts);
        scoreDisplay.textContent = score + ' punti';
        confirmBtn.style.display = 'none';
        contestBtn.style.display = '';
        nextBtn.style.display = '';
    }

    function showFeedback(isCorrect, pts) {
        feedback.style.display = '';
        feedback.classList.add('visible');
        if (isCorrect) {
            feedback.classList.add('correct-fb');
            feedback.innerHTML = '✓ Corretta!<span class="points-change">+' + pts + '</span>';
        } else {
            feedback.classList.add('wrong-fb');
            const q = quizData[currentQ];
            const labels = ['A', 'B', 'C', 'D'];
            feedback.innerHTML = '✗ Sbagliata — la risposta era ' + labels[q.ans] + ')<span class="points-change">' + pts + '</span>';
        }
    }

    function handleNext() {
        currentQ++;
        if (currentQ >= quizData.length) {
            showSummary();
        } else {
            renderQuestion();
        }
    }

    function handleContest() {
        contestArea.classList.toggle('visible');
        if (contestArea.classList.contains('visible')) {
            contestTextEl.focus();
        }
    }

    function saveContest() {
        const text = contestTextEl.value.trim();
        if (text) {
            contests[currentQ] = text;
            contestArea.classList.remove('visible');
            contestBtn.textContent = '✓ Contestata';
            contestBtn.disabled = true;
        }
    }

    function showSummary() {
        questionCard.style.display = 'none';
        document.querySelector('.score-bar').style.display = 'none';
        summary.classList.add('visible');

        const correctCount = results.filter(r => r.isCorrect).length;
        const avgTime = results.reduce((s, r) => s + r.time, 0) / results.length;
        const pct = Math.round((correctCount / 30) * 100);

        const statsHtml = `
            <div class="stat-card"><div class="stat-value">${score}</div><div class="stat-label">Punti</div></div>
            <div class="stat-card"><div class="stat-value">${correctCount}/30</div><div class="stat-label">Corrette</div></div>
            <div class="stat-card"><div class="stat-value">${pct}%</div><div class="stat-label">Percentuale</div></div>
            <div class="stat-card"><div class="stat-value">${avgTime.toFixed(1)}s</div><div class="stat-label">Tempo medio</div></div>
        `;
        document.getElementById('summaryStats').innerHTML = statsHtml;

        const labels = ['A', 'B', 'C', 'D'];
        let listHtml = '';
        results.forEach((r, i) => {
            const q = quizData[r.qIdx];
            const chosenLabel = r.chosen >= 0 ? labels[r.chosen] : '—';
            const correctLabel = labels[r.correct];
            const cls = r.isCorrect ? 'correct-r' : 'wrong-r';
            const icon = r.isCorrect ? '✓' : '✗';
            const clickable = !r.isCorrect ? ' clickable' : '';
            const explHtml = !r.isCorrect ? `<div class="q-explanation" id="expl-${i}">💡 ${escapeHtml(q.expl)}</div>` : '';
            const tapHint = !r.isCorrect ? ' <span style="font-size:0.7rem;color:#546e7a">▸ tocca per spiegazione</span>' : '';
            listHtml += `<div class="summary-item${clickable}" ${!r.isCorrect ? `onclick="toggleExpl(${i})"` : ''}>
                <div class="q-head">
                    <span class="q-num">${i + 1}. ${q.q.substring(0, 60)}${q.q.length > 60 ? '…' : ''}</span>
                    <span class="q-time">${r.time.toFixed(1)}s</span>
                </div>
                <div class="q-result ${cls}">${icon} Risposta: ${chosenLabel} | Corretta: ${correctLabel} | ${r.points > 0 ? '+' : ''}${r.points} pt${tapHint}</div>
                ${explHtml}
                ${contests[r.qIdx] ? '<div class="q-contest">📝 ' + escapeHtml(contests[r.qIdx]) + '</div>' : ''}
            </div>`;
        });
        document.getElementById('summaryList').innerHTML = listHtml;
    }

    function generateShareText() {
        const correctCount = results.filter(r => r.isCorrect).length;
        const avgTime = results.reduce((s, r) => s + r.time, 0) / results.length;
        const pct = Math.round((correctCount / 30) * 100);
        const wrongList = results.filter(r => !r.isCorrect).map((r, i) => {
            const labels = ['A', 'B', 'C', 'D'];
            return `  ${r.qIdx + 1}. ${quizData[r.qIdx].q.substring(0, 50)}… → ${r.chosen >= 0 ? labels[r.chosen] : 'tempo scaduto'} (corretta: ${labels[r.correct]})`;
        });

        let text = `🎯 QUIZZONE — Misto — 20/06/2026\n`;
        text += `━━━━━━━━━━━━━━━━━━━━━\n`;
        text += `🏆 Punteggio: ${score} punti\n`;
        text += `✅ Corrette: ${correctCount}/30 (${pct}%)\n`;
        text += `⏱️ Tempo medio: ${avgTime.toFixed(1)}s\n`;
        if (wrongList.length > 0) {
            text += `\n❌ Errori (${wrongList.length}):\n${wrongList.join('\n')}\n`;
        }
        const contestEntries = Object.entries(contests);
        if (contestEntries.length > 0) {
            text += `\n📝 Contestazioni (${contestEntries.length}):\n`;
            contestEntries.forEach(([idx, txt]) => {
                text += `  D${parseInt(idx) + 1}: ${txt}\n`;
            });
        }
        text += `━━━━━━━━━━━━━━━━━━━━━`;
        return text;
    }

    function toggleExpl(i) {
        const el = document.getElementById('expl-' + i);
        if (el) el.classList.toggle('visible');
    }

    function handleShare() {
        const text = generateShareText();
        if (navigator.share) {
            navigator.share({ title: 'Quizzone — Risultati', text }).catch(() => copyToClipboard(text));
        } else {
            copyToClipboard(text);
        }
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            const msg = document.getElementById('shareMsg');
            msg.classList.add('visible');
            setTimeout(() => msg.classList.remove('visible'), 3000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            const msg = document.getElementById('shareMsg');
            msg.classList.add('visible');
            setTimeout(() => msg.classList.remove('visible'), 3000);
        });
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function handleSaveFile() {
        const text = generateShareText();
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quizzone_2026-06-20_risultati.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Event listeners
    confirmBtn.addEventListener('click', handleConfirm);
    nextBtn.addEventListener('click', handleNext);
    contestBtn.addEventListener('click', handleContest);
    saveContestBtn.addEventListener('click', saveContest);
    document.getElementById('shareBtn').addEventListener('click', handleShare);
    document.getElementById('saveBtn').addEventListener('click', handleSaveFile);

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !confirmed && selectedOpt >= 0) {
            handleConfirm();
        } else if (e.key === 'Enter' && confirmed && currentQ < quizData.length - 1) {
            handleNext();
        } else if (!confirmed) {
            const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
            const idx = keyMap[e.key.toLowerCase()];
            if (idx !== undefined) selectOption(idx);
        }
    });

    // Init
    renderQuestion();
// UPLOAD RISULTATI VIA CLOUDFLARE WORKER
const QUIZ_META={title:'Puntata 1 â€” Misto',filename:'quiz_puntata1_misto',timerDefault:20,timerAudio:30};
const questions=quizData;
const playerName='anonymous';
const maxStreak=0;
const WORKER_URL='https://quiz-results.kerberozzo89.workers.dev';
const KNOWN_PLAYERS=['mattia','matt','jacopo','manuel','tato','gunny','ronny','1'];
const uploadBtn=document.getElementById('uploadBtn'),uploadMsg=document.getElementById('uploadMsg');

async function uploadResults(){
if(!results.length)return;
uploadBtn.disabled=true;uploadBtn.textContent='\u2601\uFE0F Caricamento...';
uploadMsg.className='upload-msg';uploadMsg.textContent='';
const corr=results.filter(r=>r.isCorrect).length;
const ts=new Date().toISOString().replace(/[-:T]/g,'').slice(0,15);
const filePath='stats/results/'+QUIZ_META.filename+'_'+playerName.trim().toLowerCase().replace(/\s+/g,'_')+'_'+ts+'.json';
const payload={playerName:playerName,quizId:QUIZ_META.filename,quizTitle:QUIZ_META.title,timestamp:new Date().toISOString(),score:score,correct:corr,total:questions.length,percentage:Math.round(corr/questions.length*100),maxStreak:maxStreak,avgTime:parseFloat((results.reduce((a,r)=>a+parseFloat(r.time),0)/results.length).toFixed(1)),results:results.map(function(r,i){return{num:i+1,question:r.q||quizData[r.qIdx].q,category:r.cat||'misto',correct:r.isCorrect,timeout:r.chosen<0,points:r.pts||r.points||0,streakBonus:r.streakBonus||0,multiplierUsed:false,timeUsed:parseFloat(r.time),chosenOption:r.chosen>=0?(r.opts?r.opts[r.chosen]:quizData[r.qIdx].opts[r.chosen]):null,correctOption:r.opts?r.opts[r.correct]:quizData[r.qIdx].opts[r.correct],contest:r.contest||contests[r.qIdx]||null};})};
try{

const data=await resp.json();
if(resp.ok&&data.success){uploadMsg.textContent='\u2713 Risultati caricati!'+(data.statsUpdated?' (stats aggiornate)':'');uploadMsg.className='upload-msg visible success';uploadBtn.textContent='\u2601\uFE0F Caricato \u2713';}
else{throw new Error(data.error||'HTTP '+resp.status);}
}catch(err){uploadMsg.textContent='\u2717 Errore: '+err.message;uploadMsg.className='upload-msg visible error';uploadBtn.disabled=false;uploadBtn.textContent='\u2601\uFE0F Riprova caricamento';}
}
uploadBtn.addEventListener('click',uploadResults);
if(KNOWN_PLAYERS.includes(playerName.trim().toLowerCase())){uploadResults();}

    </script>
