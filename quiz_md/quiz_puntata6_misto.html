    const streakDisplay = document.getElementById('streakDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const timerFill = document.getElementById('timerFill');
    const timerText = document.getElementById('timerText');
    const progressDisplay = document.getElementById('progressDisplay');
    const questionCard = document.getElementById('questionCard');
    const questionNumber = document.getElementById('questionNumber');
    const questionCategory = document.getElementById('questionCategory');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const confirmBtn = document.getElementById('confirmBtn');
    const multiplierBtn = document.getElementById('multiplierBtn');
    const contestBtn = document.getElementById('contestBtn');
    const contestArea = document.getElementById('contestArea');
    const contestText = document.getElementById('contestText');
    const saveContestBtn = document.getElementById('saveContestBtn');
    const nextBtn = document.getElementById('nextBtn');
    const summary = document.getElementById('summary');
    const summaryStats = document.getElementById('summaryStats');
    const summaryList = document.getElementById('summaryList');
    const shareBtn = document.getElementById('shareBtn');
    const saveBtn = document.getElementById('saveBtn');
    const shareMsg = document.getElementById('shareMsg');

    // Name input
    playerNameInput.addEventListener('input', function() {
        startBtn.disabled = this.value.trim().length === 0;
    });
    playerNameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && this.value.trim().length > 0) {
            startQuiz();
        }
    });
    startBtn.addEventListener('click', startQuiz);

    function startQuiz() {
        playerName = playerNameInput.value.trim();
        if (!playerName) return;
        playerNameDisplay.textContent = playerName;
        nameOverlay.classList.add('hidden');
        showIntro();
    }

    // Intro overlay
    function showIntro() {
        const q = questions[currentIndex];
        introCat.textContent = catNames[q.cat] || q.cat;
        introQ.textContent = q.q;
        introOverlay.classList.remove('hidden');
    }

    introOverlay.addEventListener('click', function() {
        introOverlay.classList.add('hidden');
        showQuestion();
    });

    // Show question
    function showQuestion() {
        const q = questions[currentIndex];
        questionNumber.textContent = 'Domanda ' + (currentIndex + 1) + ' di ' + questions.length;
        questionCategory.textContent = catNames[q.cat] || q.cat;
        questionCategory.style.background = catColors[q.cat] || '#333';
        questionText.textContent = q.q;
        progressDisplay.textContent = (currentIndex + 1) + ' / ' + questions.length;

        optionsContainer.innerHTML = '';
        q.opts.forEach(function(opt, i) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', 'false');
            btn.addEventListener('click', function() { selectOption(i); });
            optionsContainer.appendChild(btn);
        });

        // Reset state
        selectedOption = -1;
        answered = false;
        multiplierActive = false;
        confirmBtn.disabled = true;
        confirmBtn.style.display = '';
        nextBtn.style.display = 'none';
        contestBtn.style.display = 'none';
        contestArea.classList.remove('visible');
        contestText.value = '';
        feedback.classList.remove('visible', 'correct-fb', 'wrong-fb');
        feedback.innerHTML = '';
        multiplierBtn.style.display = multiplierRemaining > 0 ? '' : 'none';
        multiplierBtn.classList.remove('used');

        // Start timer
        startTimer();
    }

    // Timer
    function startTimer() {
        timeLeft = 20;
        startTime = Date.now();
        timerFill.style.width = '100%';
        timerFill.className = 'timer-fill';
        timerText.textContent = '20s';

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(function() {
            const elapsed = (Date.now() - startTime) / 1000;
            timeLeft = Math.max(0, 20 - elapsed);
            const pct = (timeLeft / 20) * 100;
            timerFill.style.width = pct + '%';
            timerText.textContent = Math.ceil(timeLeft) + 's';

            if (timeLeft <= 5) {
                timerFill.className = 'timer-fill danger';
            } else if (timeLeft <= 10) {
                timerFill.className = 'timer-fill warning';
            } else {
                timerFill.className = 'timer-fill';
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                handleTimeout();
            }
        }, 100);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    // Select option
    function selectOption(index) {
        if (answered) return;
        selectedOption = index;
        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach(function(btn, i) {
            btn.classList.toggle('selected', i === index);
            btn.setAttribute('aria-checked', i === index ? 'true' : 'false');
        });
        confirmBtn.disabled = false;
    }

    // Multiplier
    multiplierBtn.addEventListener('click', function() {
        if (answered || multiplierRemaining <= 0 || multiplierActive) return;
        multiplierActive = true;
        multiplierRemaining--;
        multiplierBtn.classList.add('used');
        multiplierDisplay.textContent = '⚡ x2 rimasti: ' + multiplierRemaining + '/4';
    });

    // Confirm answer
    confirmBtn.addEventListener('click', function() {
        if (answered || selectedOption < 0) return;
        stopTimer();
        processAnswer(selectedOption);
    });

    // Handle timeout
    function handleTimeout() {
        if (answered) return;
        processAnswer(-1);
    }

    // Calculate penalty
    function getPenalty() {
        if (score < 0) return 25;
        if (score <= 1000) return 75;
        if (score <= 3000) return 150;
        return 300;
    }

    // Process answer
    function processAnswer(chosen) {
        answered = true;
        const q = questions[currentIndex];
        const correct = q.ans;
        const elapsed = (Date.now() - startTime) / 1000;
        const timeUsed = Math.min(elapsed, 20);
        const isCorrect = chosen === correct;
        const isTimeout = chosen === -1;

        // Disable options
        const btns = optionsContainer.querySelectorAll('.option-btn');
        btns.forEach(function(btn, i) {
            btn.classList.add('disabled');
            if (i === correct) btn.classList.add('correct');
            if (i === chosen && !isCorrect) btn.classList.add('wrong');
        });

        let pointsChange = 0;
        let streakBonus = 0;
        let feedbackText = '';

        if (isCorrect) {
            // Score: 300 - (timeUsed/20 * 200), min 100
            pointsChange = Math.max(100, Math.round(300 - (timeUsed / 20) * 200));
            if (multiplierActive) pointsChange *= 2;
            streak++;
            if (streak > maxStreak) maxStreak = streak;

            // Streak bonuses
            if (streak === 3) { streakBonus = 50; }
            else if (streak === 5) { streakBonus = 100; }
            else if (streak === 7) { streakBonus = 200; }

            score += pointsChange + streakBonus;
            feedbackText = '✓ Corretto!<span class="points-change">+' + pointsChange + ' punti</span>';
            if (streakBonus > 0) {
                feedbackText += '<span class="streak-bonus">+' + streakBonus + ' streak bonus!</span>';
            }
            feedback.className = 'feedback visible correct-fb';
        } else {
            // Penalty
            let penalty = getPenalty();
            if (multiplierActive) penalty = Math.round(penalty * 1.5);
            pointsChange = -penalty;
            score += pointsChange;
            streak = 0;

            if (isTimeout) {
                feedbackText = '⏱ Tempo scaduto!<span class="points-change">' + pointsChange + ' punti</span>';
            } else {
                feedbackText = '✗ Sbagliato!<span class="points-change">' + pointsChange + ' punti</span>';
            }
            feedbackText += '<br><small>Risposta corretta: ' + q.opts[correct] + '</small>';
            feedback.className = 'feedback visible wrong-fb';
        }

        feedback.innerHTML = feedbackText;
        scoreDisplay.textContent = score + ' punti';
        updateStreakDisplay();

        // Show UI
        confirmBtn.style.display = 'none';
        multiplierBtn.style.display = 'none';
        nextBtn.style.display = '';
        contestBtn.style.display = '';

        // Save result
        results.push({
            index: currentIndex,
            question: q.q,
            category: q.cat,
            options: q.opts,
            correct: correct,
            chosen: chosen,
            isCorrect: isCorrect,
            isTimeout: isTimeout,
            points: pointsChange,
            streakBonus: streakBonus,
            multiplierUsed: multiplierActive,
            timeUsed: timeUsed,
            contest: ''
        });
    }

    function updateStreakDisplay() {
        if (streak >= 2) {
            streakDisplay.textContent = '🔥' + streak;
        } else {
            streakDisplay.textContent = '';
        }
    }

    // Contest
    contestBtn.addEventListener('click', function() {
        contestArea.classList.toggle('visible');
    });

    saveContestBtn.addEventListener('click', function() {
        const text = contestText.value.trim();
        if (text && results.length > 0) {
            results[results.length - 1].contest = text;
        }
        contestArea.classList.remove('visible');
    });

    // Next question
    nextBtn.addEventListener('click', function() {
        currentIndex++;
        if (currentIndex >= questions.length) {
            showSummary();
        } else {
            showIntro();
        }
    });

    // Summary
    function showSummary() {
        questionCard.style.display = 'none';
        document.getElementById('scoreBar').style.display = 'none';
        summary.classList.add('visible');

        const totalCorrect = results.filter(function(r) { return r.isCorrect; }).length;
        const totalWrong = results.filter(function(r) { return !r.isCorrect && !r.isTimeout; }).length;
        const totalTimeout = results.filter(function(r) { return r.isTimeout; }).length;
        const avgTime = results.reduce(function(sum, r) { return sum + r.timeUsed; }, 0) / results.length;

        summaryStats.innerHTML = '' +
            '<div class="stat-card"><div class="stat-value">' + score + '</div><div class="stat-label">Punteggio</div></div>' +
            '<div class="stat-card"><div class="stat-value">' + totalCorrect + '/' + questions.length + '</div><div class="stat-label">Corrette</div></div>' +
            '<div class="stat-card"><div class="stat-value">' + Math.round(totalCorrect/questions.length*100) + '%</div><div class="stat-label">Percentuale</div></div>' +
            '<div class="stat-card"><div class="stat-value">' + maxStreak + '</div><div class="stat-label">Max Streak</div></div>' +
            '<div class="stat-card"><div class="stat-value">' + avgTime.toFixed(1) + 's</div><div class="stat-label">Tempo medio</div></div>';

        let listHTML = '';
        results.forEach(function(r, i) {
            const statusClass = r.isCorrect ? 'correct-r' : 'wrong-r';
            const statusText = r.isCorrect ? '✓ Corretto' : (r.isTimeout ? '⏱ Timeout' : '✗ Sbagliato');
            const pts = r.points >= 0 ? '+' + r.points : '' + r.points;
            const bonusText = r.streakBonus > 0 ? ' (+' + r.streakBonus + ' streak)' : '';
            const multText = r.multiplierUsed ? ' [x2]' : '';
            const contestHTML = r.contest ? '<div class="q-contest">📝 ' + escapeHTML(r.contest) + '</div>' : '';

            listHTML += '<div class="summary-item" data-idx="' + i + '">' +
                '<div class="q-head"><span class="q-num">#' + (i + 1) + ' - ' + (catNames[r.category] || r.category) + '</span><span class="q-time">' + r.timeUsed.toFixed(1) + 's</span></div>' +
                '<div class="q-result ' + statusClass + '">' + statusText + ' ' + pts + ' punti' + bonusText + multText + '</div>' +
                '<div class="q-explanation" id="exp-' + i + '">' +
                '<strong>Domanda:</strong> ' + escapeHTML(r.question) + '<br>' +
                '<strong>Risposta corretta:</strong> ' + escapeHTML(r.options[r.correct]) + '<br>' +
                (r.chosen >= 0 && !r.isCorrect ? '<strong>Tua risposta:</strong> ' + escapeHTML(r.options[r.chosen]) + '<br>' : '') +
                '</div>' +
                contestHTML +
                '</div>';
        });
        summaryList.innerHTML = listHTML;

        // Toggle expandable
        summaryList.addEventListener('click', function(e) {
            const item = e.target.closest('.summary-item');
            if (!item) return;
            const idx = item.getAttribute('data-idx');
            const exp = document.getElementById('exp-' + idx);
            if (exp) exp.classList.toggle('visible');
        });
    }

    function escapeHTML(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Share
    shareBtn.addEventListener('click', function() {
        const totalCorrect = results.filter(function(r) { return r.isCorrect; }).length;
        let text = '🎯 QUIZZONE — Puntata 6 — Misto\n';
        text += '👤 ' + playerName + '\n';
        text += '🏆 Punteggio: ' + score + ' punti\n';
        text += '✅ Corrette: ' + totalCorrect + '/' + questions.length + '\n';
        text += '🔥 Max streak: ' + maxStreak + '\n\n';

        results.forEach(function(r, i) {
            const icon = r.isCorrect ? '✅' : (r.isTimeout ? '⏱️' : '❌');
            const pts = r.points >= 0 ? '+' + r.points : '' + r.points;
            const bonus = r.streakBonus > 0 ? ' (+' + r.streakBonus + ' streak)' : '';
            const mult = r.multiplierUsed ? ' [x2]' : '';
            text += icon + ' #' + (i + 1) + ' ' + (catNames[r.category] || r.category) + ' — ' + pts + bonus + mult + ' (' + r.timeUsed.toFixed(1) + 's)\n';
            if (r.contest) {
                text += '   📝 Contestazione: ' + r.contest + '\n';
            }
        });

        navigator.clipboard.writeText(text).then(function() {
            shareMsg.classList.add('visible');
            setTimeout(function() { shareMsg.classList.remove('visible'); }, 3000);
        }).catch(function() {
            // fallback
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            shareMsg.classList.add('visible');
            setTimeout(function() { shareMsg.classList.remove('visible'); }, 3000);
        });
    });

    // Save as text file
    saveBtn.addEventListener('click', function() {
        const totalCorrect = results.filter(function(r) { return r.isCorrect; }).length;
        let text = 'QUIZZONE — Puntata 6 — Misto\n';
        text += 'Giocatore: ' + playerName + '\n';
        text += 'Punteggio: ' + score + ' punti\n';
        text += 'Corrette: ' + totalCorrect + '/' + questions.length + '\n';
        text += 'Max streak: ' + maxStreak + '\n';
        text += '='.repeat(50) + '\n\n';

        results.forEach(function(r, i) {
            const status = r.isCorrect ? 'CORRETTO' : (r.isTimeout ? 'TIMEOUT' : 'SBAGLIATO');
            const pts = r.points >= 0 ? '+' + r.points : '' + r.points;
            text += '#' + (i + 1) + ' [' + (catNames[r.category] || r.category) + '] — ' + status + ' — ' + pts + ' punti';
            if (r.streakBonus > 0) text += ' (+' + r.streakBonus + ' streak)';
            if (r.multiplierUsed) text += ' [x2]';
            text += ' (' + r.timeUsed.toFixed(1) + 's)\n';
            text += '   Q: ' + r.question + '\n';
            text += '   Risposta corretta: ' + r.options[r.correct] + '\n';
            if (r.chosen >= 0 && !r.isCorrect) {
                text += '   Tua risposta: ' + r.options[r.chosen] + '\n';
            }
            if (r.contest) {
                text += '   CONTESTAZIONE: ' + r.contest + '\n';
            }
            text += '\n';
        });

        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quizzone_puntata6_' + playerName.replace(/\s+/g, '_') + '.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });

})();
</script>
</body>
</html>
